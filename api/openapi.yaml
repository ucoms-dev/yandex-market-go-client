          type: string
        toDate:
          description: |
            Формат даты: `ДД-ММ-ГГГГ`.
          example: 23-09-2022
          format: date-dd-MM-yyyy
          type: string
      type: object
    BusinessOrderBoxLayoutPartialCountDTO:
