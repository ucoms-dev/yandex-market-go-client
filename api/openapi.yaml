        * `DIRECT_DISCOUNT` — прямая скидка.

        * `BLUE_FLASH` — флеш-акция.

        * `MARKET_PROMOCODE` — скидка по промокоду.
      enum:
      - DIRECT_DISCOUNT
      - BLUE_FLASH
      - MARKET_PROMOCODE
      type: string
    GetPromosResultDTO:
      description: Информация об акциях Маркета.
