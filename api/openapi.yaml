          description: Название токена.
          maxLength: 100
          minLength: 1
          type: string
        authScopes:
          description: Доступы к методам по Api-Key-токену.
          items:
            $ref: "#/components/schemas/ApiKeyScopeType"
          nullable: false
          type: array
          uniqueItems: true
      required:
      - authScopes
      - name
      type: object
    OperationResultDTO:
      description: Результат выполнения.
      example:
        id: id
        type: ORDER_RECIPIENT_UPDATE
        status: IN_PROGRESS
      properties:
        id:
          description: Идентификатор операции.
          maxLength: 1000
          minLength: 1
          type: string
        type:
          $ref: "#/components/schemas/OperationType"
        status:
          $ref: "#/components/schemas/OperationStatusType"
      required:
      - id
      - status
      - type
      type: object
    CampaignSettingsScheduleSourceType:
      description: |
        Источник информации о расписании работы службы доставки.
        Возможные значения:
        * `WEB` — информация получена из настроек кабинета продавца на Маркете.
        * `YML` — информация получена из прайс-листа магазина.
      enum:
      - WEB
      - YML
      type: string
    CampaignSettingsDeliveryDTO:
      description: Информация о доставке в своем регионе магазина.
      example:
        schedule:
          customWorkingDays:
          - 23-09-2022
          - 23-09-2022
          period:
            fromDate: 23-09-2022
            toDate: 23-09-2022
          customHolidays:
          - 23-09-2022
          - 23-09-2022
          weeklyHolidays:
          - 1
          - 1
          availableOnHolidays: true
          totalHolidays:
          - 23-09-2022
          - 23-09-2022
      properties:
        schedule:
          $ref: "#/components/schemas/CampaignSettingsScheduleDTO"
      type: object
    OrderVatType:
      description: |
        НДС на товар или доставку:

        * `NO_VAT` — НДС не облагается, используется только для отдельных видов услуг.

        * `VAT_0` — НДС 0%. Например, используется при продаже товаров, вывезенных в таможенной процедуре экспорта, или при оказании услуг по международной перевозке товаров.

        * `VAT_10` — НДС 10%. Например, используется при реализации отдельных продовольственных и медицинских товаров.

        * `VAT_10_110` — НДС 10/110. НДС 10%, применяется только при предоплате.

        * `VAT_20` — НДС 20%. Основной НДС с 2019 года до 1 января 2026 года.

        * `VAT_20_120` — НДС 20/120. НДС 20%, применяется только при предоплате.

        * `VAT_18` — НДС 18%. Основной НДС до 2019 года.

        * `VAT_18_118` — НДС 18/118. НДС использовался до 1 января 2019 года при предоплате.

        * `VAT_12` — НДС 12%. Используется только в Узбекистане.

        * `VAT_05` — НДС 5%. НДС для упрощенной системы налогообложения (УСН).

        * `VAT_07` — НДС 7%. НДС для упрощенной системы налогообложения (УСН).

        * `VAT_22` — НДС 22%. Основной НДС с 1 января 2026 года.

        * `UNKNOWN_VALUE` — неизвестный тип.
      enum:
      - NO_VAT
      - VAT_0
      - VAT_10
      - VAT_10_110
      - VAT_20
      - VAT_20_120
      - VAT_18
      - VAT_18_118
      - VAT_12
      - VAT_05
      - VAT_07
      - VAT_22
      - UNKNOWN_VALUE
      type: string
    OrderItemPromoDTO:
      description: "Информация о вознаграждении продавцу за скидки на товар по про\
        мокодам, купонам и акциям."
      example:
        subsidy: 6.84685269835264
        shopPromoId: shopPromoId
        discount: 1.4894159098541704
        marketPromoId: marketPromoId
        type: DIRECT_DISCOUNT
      properties:
        type:
          $ref: "#/components/schemas/OrderPromoType"
        discount:
          description: |
            Размер пользовательской скидки в валюте покупателя.
          type: number
        subsidy:
          description: |
            Вознаграждение продавцу от Маркета за товар, проданный в рамках акции.
          type: number
        shopPromoId:
          description: |
            Идентификатор акции поставщика.
          type: string
        marketPromoId:
          description: |
            Идентификатор акции в рамках соглашения на оказание услуг по продвижению сервиса между Маркетом и продавцом.
          type: string
      required:
      - subsidy
      - type
      type: object
    OrderItemInstanceDTO:
      description: |
        Переданные для данной позиции коды маркировки или УИНы. Коды «Честного знака» возвращаются в двух вариантах — с криптохвостом и без.
      example:
        rnpt: rnpt
        gtd: gtd
        countryCode: RU
        cisFull: cisFull
        uin: uin
        cis: cis
      properties:
        cis:
          description: "Код идентификации единицы товара в системе [«Честный ЗНАК»\
            ](https://честныйзнак.рф/) без криптохвоста или [«ASL BELGISI»](https://aslbelgisi.uz)\
            \ (для продавцов Market Yandex Go)."
          type: string
        cisFull:
          description: "Код идентификации единицы товара в системе [«Честный ЗНАК»\
            ](https://честныйзнак.рф/) с криптохвостом."
          type: string
        uin:
          description: |
            УИН ювелирного изделия (16-значный код)
            Производитель получает УИН, когда регистрирует изделие в системе контроля за оборотом драгоценных металлов и камней — ГИИС ДМДК.
          type: string
        rnpt:
          description: |
            Регистрационный номер партии товара.

            Представляет собой строку из четырех чисел, разделенных косой чертой: ХХХХХХХХ/ХХХХХХ/ХХХХХХХ/ХХХ.

            Первая часть — код таможни, которая зарегистрировала декларацию на партию товара. Далее — дата, номер декларации и номер маркированного товара в декларации.
          type: string
        gtd:
          description: |
            Грузовая таможенная декларация.

            Представляет собой строку из трех чисел, разделенных косой чертой: ХХХХХХХХ/ХХХХХХ/ХХХХХХХ.

            Первая часть — код таможни, которая зарегистрировала декларацию на ввезенные товары. Далее — дата и номер декларации.
          type: string
        countryCode:
          description: |
            Страна производства в формате ISO 3166-1 alpha-2. [Как получить](../../reference/regions/getRegionsCodes.md)
          example: RU
          maxLength: 2
          minLength: 2
          pattern: "^[A-Z]{2}$"
          type: string
      type: object
    OrderItemDetailDTO:
      description: Детали по товару в заказе.
      example:
        updateDate: 23-09-2022
        itemStatus: REJECTED
        itemCount: 7
      properties:
        itemCount:
          description: Количество единиц товара.
          format: int64
          type: integer
        itemStatus:
          $ref: "#/components/schemas/OrderItemStatusType"
        updateDate:
          description: |
            Формат даты: `ДД-ММ-ГГГГ`.
          example: 23-09-2022
          format: date-dd-MM-yyyy
          type: string
      required:
      - itemCount
      - itemStatus
      - updateDate
      type: object
    OrderItemSubsidyDTO:
      description: |
        Общее вознаграждение продавцу за все скидки на товар:

        * по промокодам, купонам и акциям;
        * по баллам Плюса.

        Включает НДС.
      example:
        amount: 1.1730742509559433
        type: YANDEX_CASHBACK
      properties:
        type:
          $ref: "#/components/schemas/OrderItemSubsidyType"
        amount:
          description: Сумма субсидии.
          type: number
      required:
      - amount
      - type
      type: object
    OrderItemInstanceType:
      description: |
        Вид маркировки товара:

        * `CIS` — КИЗ, идентификатор единицы товара в системе [«Честный ЗНАК»](https://честныйзнак.рф/) или [«ASL BELGISI»](https://aslbelgisi.uz) (для продавцов Market Yandex Go). Обязателен для заполнения.

        * `CIS_OPTIONAL` — КИЗ, идентификатор единицы товара в системе [«Честный ЗНАК»](https://честныйзнак.рф/). Необязателен для заполнения, но в ближайшее время потребуется его передача.

        * `UIN` — УИН, уникальный идентификационный номер.

        * `RNPT` — РНПТ, регистрационный номер партии товара.

        * `GTD` — номер ГТД, грузовой таможенной декларации.
      enum:
      - CIS
      - CIS_OPTIONAL
      - UIN
      - RNPT
      - GTD
      type: string
    OrderItemTagType:
      description: |
        Признак товара:

        * `ULTIMA` — премиум-товар.
        * `SAFE_TAG` — товар с [защитной меткой](*safe-tag).
      enum:
      - ULTIMA
      - SAFE_TAG
      type: string
    OrderSubsidyType:
      description: |
        Тип субсидии:

        * `YANDEX_CASHBACK` — скидка по подписке Яндекс Плюс.

        * `SUBSIDY` — скидка Маркета (по акциям, промокодам, купонам и т. д.)

        * `DELIVERY` — скидка за доставку (DBS).
      enum:
      - YANDEX_CASHBACK
      - SUBSIDY
      - DELIVERY
      type: string
    OrderDeliveryType:
      description: |
        Способ доставки заказа:

        * `DELIVERY` — курьерская доставка.

        * `PICKUP` — самовывоз.

        * `POST` — почта.

        * `DIGITAL` — для цифровых товаров.

        * `UNKNOWN` — неизвестный тип.
      enum:
      - DELIVERY
      - PICKUP
      - POST
      - DIGITAL
      - UNKNOWN
      type: string
    OrderDeliveryPartnerType:
      description: |
        Тип сотрудничества со службой доставки в рамках конкретного заказа:

        * `SHOP` — магазин работает со службой доставки напрямую или доставляет заказы самостоятельно.

        * `YANDEX_MARKET` — магазин работает со службой доставки через Маркет.

        * `UNKNOWN` — неизвестный тип.
      enum:
      - SHOP
      - YANDEX_MARKET
      - UNKNOWN
      type: string
    OrderCourierDTO:
      description: Информация о курьере.
      example:
        vehicleDescription: vehicleDescription
        phone: phone
        phoneExtension: phoneExtension
        fullName: fullName
        vehicleNumber: vehicleNumber
      properties:
        fullName:
          description: Полное имя.
          type: string
        phone:
          description: Номер телефона.
          type: string
        phoneExtension:
          description: Добавочный номер телефона.
          type: string
        vehicleNumber:
          description: Номер транспортного средства.
          type: string
        vehicleDescription:
          description: "Описание транспортного средства. Например, модель и цвет."
          type: string
      type: object
    OrderDeliveryDatesDTO:
      description: Диапазон дат доставки.
      example:
        fromDate: 23-09-2022
        toDate: 23-09-2022
        fromTime: fromTime
        toTime: toTime
        realDeliveryDate: 23-09-2022
      properties:
        fromDate:
          description: |
            Формат даты: `ДД-ММ-ГГГГ`.
          example: 23-09-2022
          format: date-dd-MM-yyyy
          type: string
        toDate:
          description: |
            Формат даты: `ДД-ММ-ГГГГ`.
          example: 23-09-2022
          format: date-dd-MM-yyyy
          type: string
        fromTime:
          description: |
            Начало интервала времени доставки.

            Передается только вместе с параметром `type=DELIVERY`.

            Формат времени: 24-часовой, `ЧЧ:ММ`. Вместо `ММ` всегда указывайте `00` (исключение — `23:59`).

            Минимальное значение: `00:00`.
          format: time
          type: string
        toTime:
          description: |
            Конец интервала времени доставки.

            Передается только вместе с параметром `type=DELIVERY`.

             Формат времени: 24-часовой, `ЧЧ:ММ`. Вместо `ММ` всегда указывайте `00` (исключение — `23:59`).

            Максимальное значение: `23:59`.
          format: time
          type: string
        realDeliveryDate:
          description: |
            Формат даты: `ДД-ММ-ГГГГ`.
          example: 23-09-2022
          format: date-dd-MM-yyyy
          type: string
      required:
      - fromDate
      type: object
    OrderDeliveryAddressDTO:
      description: |
        Адрес доставки.

        Указывается, если параметр `type` принимает значение `DELIVERY`, `POST` или `PICKUP` (только для модели DBS). Если `type=PICKUP`, возвращается адрес пункта выдачи.
      example:
        country: country
        city: city
        postcode: postcode
        estate: estate
        gps:
          latitude: 9.369310271410669
          longitude: 6.683562403749608
        house: house
        building: building
        subway: subway
        phone: phone
        street: street
        district: district
        recipient: recipient
        entryphone: entryphone
        block: block
        entrance: entrance
        floor: floor
        apartment: apartment
      properties:
        country:
          description: |
            Страна.
          type: string
        postcode:
          description: |
            Почтовый индекс.

            Указывается, если выбрана доставка почтой (`delivery type=POST`).
          type: string
        city:
          description: |
            Город или населенный пункт.
          type: string
        district:
          description: Район.
          type: string
        subway:
          description: Станция метро.
          type: string
        street:
          description: |
            Улица.
          type: string
        house:
          description: |
            Номер дома.
          type: string
        estate:
          description: |
            Номер владения.
          type: string
        block:
          description: Корпус.
          type: string
        building:
          description: Строение.
          type: string
        entrance:
          description: Номер подъезда.
          type: string
        entryphone:
          description: Код домофона.
          type: string
        floor:
          description: Этаж.
          type: string
        apartment:
          description: Номер квартиры или офиса.
          type: string
        phone:
          description: |
            Телефон получателя заказа.
          type: string
        recipient:
          description: |
            Фамилия, имя и отчество получателя заказа.
          type: string
        gps:
          $ref: "#/components/schemas/GpsDTO"
      type: object
    OrderLiftType:
      description: |
        Тип подъема заказа на этаж:

        * `NOT_NEEDED` — не требуется.

        * `MANUAL` — ручной.

        * `ELEVATOR` — лифт.

        * `CARGO_ELEVATOR` — грузовой лифт.

        * `FREE` — любой из перечисленных выше, если включена опция бесплатного подъема.

        * `UNKNOWN` — неизвестный тип.
      enum:
      - NOT_NEEDED
      - MANUAL
      - ELEVATOR
      - CARGO_ELEVATOR
      - FREE
      - UNKNOWN
      type: string
    DateDdMmYyyy:
      description: |
        Формат даты: `ДД-ММ-ГГГГ`.
      example: 23-09-2022
      format: date-dd-MM-yyyy
      type: string
    OrderTrackDTO:
      description: Информация о трек-номере посылки (DBS).
      example:
        trackCode: trackCode
        deliveryServiceId: 6
      properties:
        trackCode:
          description: Трек‑номер посылки.
          type: string
        deliveryServiceId:
          description: "Идентификатор службы доставки. Информацию о службе доставк\
            и можно получить с помощью запроса [GET\_delivery/services](../../reference/orders/getDeliveryServices.md)."
          format: int64
          type: integer
      required:
      - deliveryServiceId
      type: object
    OrderShipmentDTO:
      description: |
        Список посылок.

        В параметре может указываться несколько посылок.
      example:
        boxes:
        - fulfilmentId: fulfilmentId
          id: 6
        - fulfilmentId: fulfilmentId
          id: 6
        id: 3
        shipmentDate: 23-09-2022
        shipmentTime: shipmentTime
        tracks:
        - trackCode: trackCode
          deliveryServiceId: 6
        - trackCode: trackCode
          deliveryServiceId: 6
      properties:
        id:
          deprecated: true
          description: "Идентификатор посылки, присвоенный Маркетом."
          format: int64
          type: integer
        shipmentDate:
          description: |
            Формат даты: `ДД-ММ-ГГГГ`.
          example: 23-09-2022
          format: date-dd-MM-yyyy
          type: string
        shipmentTime:
          description: |
            **Только для модели Экспресс**

            Время, к которому магазин должен упаковать заказ и перевести его в статус `READY_TO_SHIP`. После смены статуса за заказом приедет курьер.

            Поле может появиться не сразу. Запрашивайте информацию о заказе в течении 5–10 минут, пока оно не вернется.

            Формат времени: 24-часовой, `ЧЧ:ММ`.

            Если заказ сделан организацией, параметр не возвращается до согласования даты доставки.
          type: string
        tracks:
          description: |
            **Только для модели DBS**

            Информация для отслеживания посылки.
          items:
            $ref: "#/components/schemas/OrderTrackDTO"
          minItems: 1
          nullable: true
          type: array
        boxes:
          description: Список грузовых мест.
          items:
            $ref: "#/components/schemas/OrderParcelBoxDTO"
          minItems: 1
          nullable: true
          type: array
      type: object
    OrderDeliveryEacType:
      description: |
        Тип кода подтверждения ЭАПП:

        * `MERCHANT_TO_COURIER` (временно не возвращается) — продавец передает код курьеру для получения невыкупа.

        * `COURIER_TO_MERCHANT` — курьер передает код продавцу для получения заказа.

        * `CHECKING_BY_MERCHANT` — продавец проверяет код на своей стороне.
      enum:
      - MERCHANT_TO_COURIER
      - COURIER_TO_MERCHANT
      - CHECKING_BY_MERCHANT
      type: string
    ItemPriceDTO:
      description: |
        Информация о выплатах и вознаграждениях.

        {% note info "Как рассчитывается стоимость всех единиц товара и вознаграждение продавцу" %}

        * Стоимость всех единиц товара складывается из параметров `payment` и `cashback`.
        * Общая сумма вознаграждений продавцу возвращается в параметре `subsidy`.
        * Значение `payment`, `cashback` и `subsidy` может отличаться от стоимости в каталоге, потому что информация об акциях магазина не возвращается.
        * Если в заказе несколько единиц товаров, в параметрах возвращается суммарное значение.
        * Все суммы указаны в валюте магазина.

        {% endnote %}
      example:
        subsidy:
          currencyId: RUR
          value: 5.637376656633329
        vat: NO_VAT
        payment:
          currencyId: RUR
          value: 5.637376656633329
        cashback:
          currencyId: RUR
          value: 5.637376656633329
      properties:
        payment:
          $ref: "#/components/schemas/CurrencyValueDTO"
        subsidy:
          $ref: "#/components/schemas/CurrencyValueDTO"
        cashback:
          $ref: "#/components/schemas/CurrencyValueDTO"
        vat:
          $ref: "#/components/schemas/OrderVatType"
      type: object
    DeliveryPriceDTO:
      description: |
        Информация о стоимости доставки, включая подъем на этаж.

        {% note info "Как рассчитывается стоимость доставки" %}

        * Стоимость доставки складывается из параметров `payment` и `subsidy`.
        * Все суммы указаны в валюте магазина.

        {% endnote %}
      example:
        subsidy:
          currencyId: RUR
          value: 5.637376656633329
        vat: null
        payment:
          currencyId: RUR
          value: 5.637376656633329
      properties:
        payment:
          $ref: "#/components/schemas/CurrencyValueDTO"
        subsidy:
          $ref: "#/components/schemas/CurrencyValueDTO"
        vat:
          $ref: "#/components/schemas/OrderVatType"
      type: object
    BusinessOrderDeliveryDatesDTO:
      description: Диапазон дат доставки.
      example:
        fromDate: 2000-01-23
        toDate: 2000-01-23
        fromTime: fromTime
        toTime: toTime
        realDeliveryDate: 2000-01-23
      properties:
        fromDate:
          description: |
            Ближайшая дата доставки.

            Формат даты: `ГГГГ-ММ-ДД`.
          format: date
          type: string
        toDate:
          description: |
            Самая поздняя дата доставки.

            Если `toDate` не указан, считается дата в параметре `fromDate`.

            Формат даты: `ГГГГ-ММ-ДД`.
          format: date
          type: string
        fromTime:
          description: |
            Начало интервала времени доставки.

            Передается только вместе с параметром `type=DELIVERY`.

            Формат времени: 24-часовой, `ЧЧ:ММ`. Вместо `ММ` всегда указывайте `00` (исключение — `23:59`).

            Минимальное значение: `00:00`.
          format: time
          type: string
        toTime:
          description: |
            Конец интервала времени доставки.

            Передается только вместе с параметром `type=DELIVERY`.

            Формат времени: 24-часовой, `ЧЧ:ММ`. Вместо `ММ` всегда указывайте `00` (исключение — `23:59`).

            Максимальное значение: `23:59`.
          format: time
          type: string
        realDeliveryDate:
          description: |
            Дата, когда товар доставлен до пункта выдачи заказа (в случае самовывоза) или до покупателя (если заказ доставляет курьер).

            Формат даты: `ГГГГ-ММ-ДД`.
          format: date
          type: string
      required:
      - fromDate
      type: object
    BusinessOrderShipmentDTO:
