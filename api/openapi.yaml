    BaseOfferBoxCount:
      description: |
        Количество грузовых мест.

        Параметр используется, если товар представляет собой несколько коробок, упаковок и так далее. Например, кондиционер занимает два места — внешний и внутренний блоки в двух коробках.

        Для товаров, занимающих одно место, не передавайте этот параметр.
      format: int32
      minimum: 1
      type: integer
    OfferConditionDTO:
      description: |
        Состояние уцененного товара.
      example:
        reason: reason
        type: PREOWNED
        quality: PERFECT
      properties:
        type:
          $ref: "#/components/schemas/OfferConditionType"
        quality:
          $ref: "#/components/schemas/OfferConditionQualityType"
        reason:
          description: |
            Описание товара. Подробно опишите дефекты, насколько они заметны и где их искать.
          type: string
      type: object
    OfferType:
      description: |
        Особый тип товара:

        * `DEFAULT` — товары, для которых вы передавали особый тип ранее и хотите убрать его.
        * `MEDICINE` — лекарства.
        * `BOOK` — бумажные и электронные книги.
        * `AUDIOBOOK` — аудиокниги.
        * `ARTIST_TITLE` — музыкальная и видеопродукция.
        * `ON_DEMAND` — товары на заказ.
        * `ALCOHOL` — алкоголь.

        {% note info "Если ваш товар — книга" %}

        Укажите год издания в характеристиках товара. [Подробнее о параметре](../../reference/business-assortment/updateOfferMappings.md#offerparamdto)

        {% endnote %}
      enum:
      - DEFAULT
      - MEDICINE
      - BOOK
      - AUDIOBOOK
      - ARTIST_TITLE
      - ON_DEMAND
      - ALCOHOL
      type: string
    BaseOfferDownloadable:
      description: |
        Признак цифрового товара. Укажите `true`, если товар доставляется по электронной почте.

        [Как работать с цифровыми товарами](../../step-by-step/digital.md)
      type: boolean
    BaseOfferAdult:
      description: |
        Параметр включает для товара пометку 18+. Устанавливайте ее только для товаров, которые относятся к удовлетворению сексуальных потребностей.
      type: boolean
    AgeDTO:
      description: Возраст в заданных единицах измерения.
      example:
        ageUnit: YEAR
        value: 0.5962133916683182
      properties:
        value:
          description: |
            Значение.
          minimum: 0
          type: number
        ageUnit:
          $ref: "#/components/schemas/AgeUnitType"
      required:
      - ageUnit
      - value
      type: object
    BaseOfferParams:
      deprecated: true
      description: |
        {% note warning "При передаче характеристик используйте `parameterValues`." %}

         

        {% endnote %}

        Характеристики, которые есть только у товаров конкретной категории — например, диаметр колес велосипеда или материал подошвы обуви.
      items:
        $ref: "#/components/schemas/OfferParamDTO"
      minItems: 1
      nullable: true
      type: array
    PriceQuarantineVerdictType:
      description: |
        Типы карантина:

        * `PRICE_CHANGE` — новая цена слишком сильно отличается от прежней. В поле `params` будет  новая цена `CURRENT_PRICE` и последняя цена до попадания в карантин `LAST_VALID_PRICE`.
        * `LOW_PRICE` — установленная цена слишком сильно отличается от рыночной. В поле `params` будет установленная вами цена `CURRENT_PRICE` и порог попадания в карантин `MIN_PRICE`.
        * `LOW_PRICE_PROMO` — цена после применения акций слишком сильно отличается от рыночной. В поле `params` будет цена после применения акций `CURRENT_PRICE` и порог попадания в карантин `MIN_PRICE`.
      enum:
      - PRICE_CHANGE
      - LOW_PRICE
      - LOW_PRICE_PROMO
      type: string
    PriceQuarantineVerdictParameterDTO:
      description: Параметр карантина.
      example:
        name: CURRENT_PRICE
        value: value
      properties:
        name:
          $ref: "#/components/schemas/PriceQuarantineVerdictParamNameType"
        value:
          description: Значение параметра.
          type: string
      required:
      - name
      - value
      type: object
    TurnoverDTO:
      description: |
        Информация об оборачиваемости товара.

        Подробнее о хранении и оборачиваемости товаров читайте в [Справке Маркета для продавцов](https://yandex.ru/support/marketplace/ru/storage/logistics#turnover).
      example:
        turnoverDays: 6.027456183070403
        turnover: LOW
      properties:
        turnover:
          $ref: "#/components/schemas/TurnoverType"
        turnoverDays:
          description: Значение в днях.
          format: double
          type: number
      required:
      - turnover
      type: object
    WarehouseStockDTO:
      description: Информация об остатках товара.
      example:
        count: 1
        type: FIT
      properties:
        type:
          $ref: "#/components/schemas/WarehouseStockType"
        count:
          description: Значение остатков.
          format: int64
          type: integer
      required:
      - count
      - type
      type: object
    PickupDeliveryOptionsDTO:
      description: Информация о доставке в пункт выдачи.
      example:
        pickupOptions:
        - options:
          - price:
              currencyId: RUR
              value: 1.4658129805029452
            deliveryDateInterval:
              fromDate: 2000-01-23
              toDate: 2000-01-23
          - price:
              currencyId: RUR
              value: 1.4658129805029452
            deliveryDateInterval:
              fromDate: 2000-01-23
              toDate: 2000-01-23
          logisticPointId: 1
        - options:
          - price:
              currencyId: RUR
              value: 1.4658129805029452
            deliveryDateInterval:
              fromDate: 2000-01-23
              toDate: 2000-01-23
          - price:
              currencyId: RUR
              value: 1.4658129805029452
            deliveryDateInterval:
              fromDate: 2000-01-23
              toDate: 2000-01-23
          logisticPointId: 1
      properties:
        pickupOptions:
          description: Информация о доставке в пункт выдачи.
          items:
            $ref: "#/components/schemas/PickupOptionsDTO"
          type: array
      required:
      - pickupOptions
      type: object
    CourierDeliveryOptionsDTO:
      description: Информация о курьерской доставке.
      example:
        courierDeliveryOptions:
        - price:
            currencyId: RUR
            value: 1.4658129805029452
          deliveryDateInterval:
            fromDate: 2000-01-23
            toDate: 2000-01-23
          deliveryTimeInterval:
            fromTime: fromTime
            toTime: toTime
        - price:
            currencyId: RUR
            value: 1.4658129805029452
          deliveryDateInterval:
            fromDate: 2000-01-23
            toDate: 2000-01-23
          deliveryTimeInterval:
            fromTime: fromTime
            toTime: toTime
      properties:
        courierDeliveryOptions:
          description: Информация о курьерской доставке.
          items:
            $ref: "#/components/schemas/CourierDeliveryOptionDTO"
          minItems: 1
          type: array
      required:
      - courierDeliveryOptions
      type: object
    OrdersStatsPriceDTO:
      description: Цена или скидки на товар.
      example:
        total: 2.3021358869347655
        costPerItem: 5.637376656633329
        type: BUYER
      properties:
        type:
          $ref: "#/components/schemas/OrdersStatsPriceType"
        costPerItem:
          description: |
            Цена или скидка на единицу товара в заказе.

            Точность — два знака после запятой.

            Включает НДС.
          type: number
        total:
          description: |
            Суммарная цена или скидка на все единицы товара в заказе.

            Точность — два знака после запятой.

            Включает НДС.
          type: number
      type: object
    OrdersStatsWarehouseDTO:
      description: "Информация о складе, на котором хранится товар."
      example:
        name: name
        id: 7
      properties:
        id:
          description: Идентификатор склада.
          format: int64
          type: integer
        name:
          description: Название склада.
          type: string
      type: object
    OrdersStatsDetailsDTO:
      description: Информация об удалении товара из заказа.
      example:
        updateDate: 2000-01-23
        stockType: FIT
        itemStatus: REJECTED
        itemCount: 9
      properties:
        itemStatus:
          $ref: "#/components/schemas/OrdersStatsItemStatusType"
        itemCount:
          description: "Количество товара со статусом, указанном в параметре `itemStatus`."
          format: int64
          type: integer
        updateDate:
          description: |
            **Только для модели FBY**

            Дата, когда возврат был обработан на складе Маркета.

            Формат даты: `ГГГГ-ММ-ДД`.
          format: date
          type: string
        stockType:
          $ref: "#/components/schemas/OrdersStatsStockType"
      type: object
    OrdersStatsPaymentType:
      description: |
        Тип денежного перевода:
        - `PAYMENT` — оплата.
        - `REFUND` — возврат.
      enum:
      - PAYMENT
      - REFUND
      type: string
    OrdersStatsPaymentSourceType:
      description: |
        Способ денежного перевода:
        - `BUYER` — оплата или возврат деньгами.
        - `MARKET_CESSION` — уступка задолженности покупателя.

        Устаревшие способы:
        - `CASHBACK`.
        - `MARKETPLACE`.
        - `SPLIT`.
      enum:
      - BUYER
      - CASHBACK
      - MARKETPLACE
      - MARKET_CESSION
      - SPLIT
      type: string
    OrdersStatsPaymentOrderDTO:
      description: Информация о платежном поручении.
      example:
        date: 2000-01-23
        id: id
      properties:
        id:
          description: Номер платежного поручения.
          type: string
        date:
          description: |
            Дата платежного поручения.

            Формат даты: `ГГГГ‑ММ‑ДД`.
          format: date
          type: string
      type: object
    OrdersStatsCommissionType:
      description: |
        Услуга:

        * `FEE` — размещение товара на Маркете.
        * `FULFILLMENT` — складская обработка. Не возвращается с 1 января 2024 года.
        * `LOYALTY_PARTICIPATION_FEE` — участие в программе лояльности и отзывы за баллы.
        * `AUCTION_PROMOTION` — буст продаж с оплатой за продажи.
        * `INSTALLMENT` — рассрочка. Не возвращается с 24 февраля 2022 года.
        * `DELIVERY_TO_CUSTOMER` — доставка покупателю (FBY, FBS). Для DBS и Экспресс — если заказ возвращается через логистику Маркета.
        * `EXPRESS_DELIVERY_TO_CUSTOMER` — экспресс-доставка покупателю (Экспресс).
        * `AGENCY` — прием платежа покупателя.
        * `PAYMENT_TRANSFER` — перевод платежа покупателя.
        * `RETURNED_ORDERS_STORAGE` — хранение невыкупов и возвратов (FBS). Для DBS и Экспресс — если заказ возвращается через логистику Маркета.
        * `SORTING` — обработка заказа (FBS).
        * `INTAKE_SORTING` — организация забора заказов со склада продавца (FBS).
        * `RETURN_PROCESSING` — обработка заказов на складе (FBS). Для DBS и Экспресс — если заказ возвращается через логистику Маркета.
        * `ILLIQUID_GOODS_SALE` — вознаграждение за продажу невывезенных товаров.
        * `CROSSREGIONAL_DELIVERY` - доставка средней мили.
      enum:
      - FEE
      - FULFILLMENT
      - LOYALTY_PARTICIPATION_FEE
      - AUCTION_PROMOTION
      - INSTALLMENT
      - DELIVERY_TO_CUSTOMER
      - EXPRESS_DELIVERY_TO_CUSTOMER
      - AGENCY
      - PAYMENT_TRANSFER
      - RETURNED_ORDERS_STORAGE
      - SORTING
      - INTAKE_SORTING
      - RETURN_PROCESSING
      - ILLIQUID_GOODS_SALE
      - CROSSREGIONAL_DELIVERY
      type: string
    OrdersStatsSubsidyOperationType:
      description: |
        Тип операции с баллами, которые используются для уменьшения стоимости размещения:

        * `ACCRUAL` — начисление баллов.
        * `DEDUCTION` — списание баллов.
      enum:
      - ACCRUAL
      - DEDUCTION
      type: string
    OrdersStatsSubsidyType:
      description: |
        Источник баллов, которые используются для уменьшения стоимости размещения:

        * `YANDEX_CASHBACK` — скидка по подписке Яндекс Плюс.

        * `SUBSIDY` — скидка Маркета (по акциям, промокодам, купонам и т. д.)

        * `DELIVERY` — скидка за доставку (DBS).
      enum:
      - YANDEX_CASHBACK
      - SUBSIDY
      - DELIVERY
      type: string
    TariffType:
      description: |
        Услуга Маркета или дополнительный тариф к услуге размещения:

        * `AGENCY_COMMISSION` — прием платежа покупателя.

        * `PAYMENT_TRANSFER` — перевод платежа покупателя.

        * `STORAGE` — хранение товара на складе Маркета в течение суток.

        * `SURPLUS` — хранение излишков на складе Маркета.

        * `WITHDRAW` — вывоз товара со склада Маркета.

        * `FEE` — размещение товара на Маркете.

        * `DELIVERY_TO_CUSTOMER` — доставка покупателю.

        * `CROSSREGIONAL_DELIVERY` — доставка в федеральный округ, город или населенный пункт.

        * `CROSSREGIONAL_DELIVERY_RETURN` — доставка невыкупов и возвратов.

        * `DISPOSAL` — утилизация.

        * `SORTING_CENTER_STORAGE` — хранение невыкупов и возвратов.

        * `EXPRESS_DELIVERY` — экспресс-доставка покупателю.

        * `FF_XDOC_SUPPLY_BOX` — поставка товара через транзитный склад (за короб).

        * `FF_XDOC_SUPPLY_PALLET` — поставка товара через транзитный склад (за палету).

        * `SORTING` — обработка заказа.

        * `MIDDLE_MILE` — средняя миля.

        * `RETURN_PROCESSING` — обработка невыкупов и возвратов.

        * `EXPRESS_CANCELLED_BY_PARTNER` — отмена заказа с экспресс-доставкой.

        * `CROSSBORDER_DELIVERY` — доставка из-за рубежа.

        * `INTAKE_SORTING_BULKY_CARGO` — сортировка заказов с крупногабаритными товарами, которые Маркет забрал со склада продавца.

        * `INTAKE_SORTING_SMALL_GOODS` — сортировка заказов с малогабаритными товарами, которые Маркет забрал со склада продавца.

        * `INTAKE_SORTING_DAILY` — организация забора заказов со склада продавца.

        * `FF_STORAGE_BILLING` — хранение товаров на складе.

        * `CANCELLED_ORDER_FEE_QI` — отмена заказа по вине продавца.

        * `LATE_ORDER_EXECUTION_FEE_QI` — несвоевременная отгрузка или доставка.

        * `VOLUME_STORAGE` — стоимость хранения товара на складе — из расчёта за один кубический метр в сутки.

        * `GOODS_ACCEPTANCE` — окончательная приемка товара на складе.

        * `CARGO_ACCEPTANCE` — первичная приемка товара на складе.

        * `ORDER_PROCESSING` — обработка заказа.

        * `WITHDRAW_EXTERNAL` — отгрузка на внешний маркетплейс.

        Подробнее об услугах Маркета читайте [в Справке Маркета для продавцов](https://yandex.ru/support/marketplace/introduction/rates/index.html).
      enum:
      - AGENCY_COMMISSION
      - PAYMENT_TRANSFER
      - STORAGE
      - WITHDRAW
      - SURPLUS
      - FEE
      - DELIVERY_TO_CUSTOMER
      - CROSSREGIONAL_DELIVERY
      - CROSSREGIONAL_DELIVERY_RETURN
      - DISPOSAL
      - SORTING_CENTER_STORAGE
      - EXPRESS_DELIVERY
      - FF_XDOC_SUPPLY_BOX
      - FF_XDOC_SUPPLY_PALLET
      - SORTING
      - MIDDLE_MILE
      - RETURN_PROCESSING
      - EXPRESS_CANCELLED_BY_PARTNER
      - CROSSBORDER_DELIVERY
      - INTAKE_SORTING_BULKY_CARGO
      - INTAKE_SORTING_SMALL_GOODS
      - INTAKE_SORTING_DAILY
      - FF_STORAGE_BILLING
      - CANCELLED_ORDER_FEE_QI
      - LATE_ORDER_EXECUTION_FEE_QI
      - VOLUME_STORAGE
      - GOODS_ACCEPTANCE
      - CARGO_ACCEPTANCE
      - ORDER_PROCESSING
      - WITHDRAW_EXTERNAL
      type: string
    TariffParameterDTO:
      description: Детали расчета конкретной услуги Маркета.
      example:
        name: name
        value: value
      properties:
        name:
          description: |
            {% cut "Название параметра." %}

            Параметр `name` может принимать следующие значения:

            **Основные параметры:**
              - `value` — значение тарифа.
              - `billingUnit` — единицы измерения для товара.
              - `valueType` — тип значения тарифа: `absolute` (денежное значение) или `relative` (процент).
              - `priceDependence` — зависимость тарифа от цены товара.

            **Параметры диапазонов цен товара:**
            - `priceFrom` — минимальная цена товара, от которой применяется тариф.
            - `priceTo` — максимальная цена товара, до которой применяется тариф.

            **Параметры ограничений значения тарифа:**
            - `minValue` — минимальное значение тарифа.
            - `maxValue` — максимальное значение тарифа.

            **Параметры диапазонов дней:**
            - `dayFrom` — день, с которого начинает действовать тариф (для хранения).
            - `dayTo` — день, на который тариф прекращает действие (для хранения).

            **Параметры маршрута транзитной поставки:**
            - `xdocFrom` — начальная точка маршрута.
            - `xdocTo` — конечная точка маршрута.

            **Параметры частоты:**
            - `frequency` — частота выплат.
            - `paymentDelayWeeks` — отсрочка выплат при еженедельном графике — сколько недель назад были доставлены заказы, за которые приходит выплата.

            **Параметры складов и логистики:**
            - `transitWarehouseType` — тип места привоза товаров продавцом.
            - `orderCargoType` — тип груза заказа.

            **Параметры оборачиваемости:**
            - `turnoverFrom` — нижняя граница диапазона оборачиваемости, начиная с которой применяется тариф.
            - `turnoverTo` — верхняя граница диапазона оборачиваемости, исключая которую применяется тариф.

            **Параметры рейтинга:**
            - `ratingLowerBound` — нижняя граница диапазона рейтинга, по которому применяется тариф.
            - `ratingUpperBound` — верхняя граница диапазона рейтинга, по которому применяется тариф.

            **Параметры количества заказов:**
            - `fromOrders` — количество заказов, начиная с которого применяется тариф (включительно).
            - `toOrders` — количество заказов, до которого применяется тариф (не включительно).

            **Параметры доставки из-за рубежа:**
            - `shippingPrice` — стоимость отправления при доставке из-за рубежа.
            - `totalSurchargeForWeight` — сумма наценки за вес отправления при доставке из-за рубежа.

            {% note info "Не все параметры возвращаются для каждого тарифа." %}

            Набор параметров зависит от типа услуги и условий применения тарифа.

            {% endnote %}

            {% endcut %}
          type: string
        value:
          description: Значение параметра.
          type: string
      required:
      - name
      - value
      type: object
    DayOfWeekType:
      description: |
        День недели:

        * `MONDAY` — понедельник.
        * `TUESDAY` — вторник.
        * `WEDNESDAY` — среда.
        * `THURSDAY` — четверг.
        * `FRIDAY` — пятница.
        * `SATURDAY` — суббота.
        * `SUNDAY` — воскресенье.
      enum:
      - MONDAY
      - TUESDAY
      - WEDNESDAY
      - THURSDAY
      - FRIDAY
      - SATURDAY
      - SUNDAY
      type: string
    ScheduleDayDTO:
      description: День и время работы.
      example:
        startTime: startTime
        endTime: endTime
        day: MONDAY
      properties:
        day:
          $ref: "#/components/schemas/DayOfWeekType"
        startTime:
          description: |
            Время начала рабочего дня.

            Формат: `ЧЧ:ММ`.
          pattern: "^([0-1][0-9]|2[0-3]):[0-5][0-9]$"
          type: string
        endTime:
          description: |
            Время конца рабочего дня.

