  /v2/campaigns/{campaignId}/shipments/reception-transfer-act:
    get:
      description: "{% include notitle [access](../../_auto/method_scopes/downloadShipmentReceptionTransferAct.md)\
        \ %}\n\nЗапрос подтверждает ближайшую отгрузку и возвращает акт приема-пер\
        едачи в формате PDF.\n\nПодтверждение отгрузки доступно только после того\
        , как она сформирована, иначе метод вернет код `400` и ошибку :no-translate[\"\
        Closest shipment for reception transfer act generation not found.\"].\n\nП\
        одробнее о приеме заказов и расписании отгрузок читайте [в Справке Маркета\
        \ для продавцов](https://yandex.ru/support/marketplace/ru/orders/fbs/settings/shipment#schedule).\n\
        \n{% note warning \"Экспресс‑доставка\" %}\n\nЕсли ваш магазин подключен к\
        \ экспресс‑доставке и вы отгружаете заказы курьерам [Яндекс Go](https://go.yandex/),\
        \ подготавливать акт приема‑передачи не нужно.\n\n{% endnote %}\n\nВ акт в\
        ходят собранные и готовые к отправке заказы, которые отгружаются в сортиро\
        вочный центр или пункт приема либо передаются курьерам Маркета.\n\nПри фор\
        мировании акта Маркет автоматически находит и подставляет в шаблон следующ\
        ие данные:\n\n{% cut \"Данные, из которых Маркет формирует акт\" %}\n\n#|\n\
        || **Данные в акте**\t                                 | **Описание**    \
        \                                                                        \
        \                                                                        \
        \                                                                        \
        \                             ||\n|| Отправитель\t                       \
        \              | Название вашего юридического лица, указанное в кабинете п\
        родавца на Маркете.                                                      \
        \                                                                        \
        \                                                           ||\n|| Исполни\
        тель                                         | Название юридического лица\
        \ сортировочного центра или службы доставки.                             \
        \                                                                        \
        \                                                                        \
        \                   ||\n|| № отправления в системе заказчика             \
        \      | Внешний идентификатор заказа продавца, который можно передать зап\
        росом [POST\_v2/campaigns/{campaignId}/orders/{orderId}/external-id](../../reference/orders/updateExternalOrderId.md).\
        \                                                                        \
        \    ||\n|| № отправления в системе исполнителя (субподрядчика) |\n  Идент\
        ификатор заказа на Маркете, как в выходных данных запроса:\n\n  * [POST\_\
        v1/businesses/{businessId}/orders](../../reference/orders/getBusinessOrders.md).||\n\
        \n|| Объявленная ценность                                |\n  Общая сумма\
        \ заказа без учета стоимости доставки, как в выходных данных запроса:\n\n\
        \  * [POST\_v1/businesses/{businessId}/orders](../../reference/orders/getBusinessOrders.md).||\n\
        \n|| Стоимость всех товаров в заказе                     | Стоимость всех\
        \ заказанных товаров.                                                    \
        \                                                                        \
        \                                                                        \
        \                               ||\n\n|| Вес                             \
        \                    |\n  Масса брутто грузового места (суммарная масса уп\
        аковки и содержимого), как в выходных данных запроса:\n\n  * [POST\_v1/businesses/{businessId}/orders](../../reference/orders/getBusinessOrders.md).||\n\
        \n|| Количество мест                                     |\n  Количество г\
        рузовых мест в заказе, как в выходных данных запроса:\n\n  * [POST\_v1/businesses/{businessId}/orders](../../reference/orders/getBusinessOrders.md).||\n\
        |#\n\n{% endcut %}\n\n{% note info \"Электронная подпись акта\" %}\n\nЕсли\
        \ вы указываете параметр `signatory`, акт приема-передачи подписывается эл\
        ектронной подписью и становится электронным документом. В этом случае печа\
        тать и подписывать акт вручную не требуется — он уже имеет юридическую сил\
        у в электронном виде.\n\nЕсли параметр `signatory` не указан, акт нужно ра\
        спечатать. В распечатанном акте укажите отправителя и исполнителя. Они дол\
        жны подписать акт и указать фамилию и инициалы рядом с подписью. При необх\
        одимости также заполните реквизиты доверенности.\n\nПодробнее о работе с а\
        ктами приема-передачи читайте [в Справке Маркета для продавцов](https://yandex.ru/support/marketplace/ru/orders/fbs/process#act).\n\
        \n{% endnote %}\n\n{% include notitle [limit](../../_auto/method_limits/downloadShipmentReceptionTransferAct.md)\
        \ %}\n"
      operationId: downloadShipmentReceptionTransferAct
      parameters:
      - description: |
          Идентификатор кампании (магазина) — технический идентификатор, который представляет ваш магазин в системе Яндекс Маркета при работе через API. Он однозначно связывается с вашим магазином, но предназначен только для автоматизированного взаимодействия.

          Его можно узнать с помощью запроса [GET v2/campaigns](../../reference/campaigns/getCampaigns.md) или найти в кабинете продавца на Маркете. Нажмите на иконку вашего аккаунта → **Настройки** и в меню слева выберите **API и модули**:

          * блок **Идентификатор кампании**;
          * вкладка **Лог запросов** → выпадающий список в блоке **Показывать логи**.

          ⚠️ Не путайте его с:
          - идентификатором магазина, который отображается в личном кабинете продавца;
          - рекламными кампаниями.
        explode: false
        in: path
        name: campaignId
        required: true
        schema:
          format: int64
          minimum: 1
          type: integer
        style: simple
      - description: Идентификатор склада.
        example: 123123
        explode: true
        in: query
        name: warehouse_id
        required: false
        schema:
          format: int32
          minimum: 1
          type: integer
        style: form
      - description: |
          Логин пользователя в Яндекс ID, от имени которого будет подписываться электронный акт приема-передачи.

          Указывается без `@yandex.ru`.

          {% note info "Электронная подпись" %}

          Если вы указываете параметр `signatory`, акт приема-передачи подписывается электронной подписью и становится электронным документом. В этом случае печатать и подписывать акт вручную не требуется — он уже имеет юридическую силу в электронном виде.

          Подробнее о работе с актами приема-передачи читайте [в Справке Маркета для продавцов](https://yandex.ru/support/marketplace/ru/orders/fbs/process#act).

          {% endnote %}

          Где найти логин:

          * на странице [Яндекс ID](https://id.yandex.ru);
          * в [кабинете продавца на Маркете](https://partner.market.yandex.ru/):

          * в правом верхнем углу под иконкой пользователя;
            * на странице **Настройки** → **Сотрудники и доступы**.
        explode: true
        in: query
        name: signatory
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/pdf:
              schema:
                format: binary
                type: string
          description: "Акт приема-передачи в формате :no-translate[PDF]."
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiClientDataErrorResponse"
          description: |
            Запрос содержит неправильные данные. [Подробнее об ошибках при работе с отгрузками](../../concepts/error-codes#shipments)
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiUnauthorizedErrorResponse"
          description: "В запросе не указаны данные для авторизации. [Подробнее об\
            \ ошибке](../../concepts/error-codes.md#401)"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiForbiddenErrorResponse"
          description: "Данные для авторизации неверны или доступ к ресурсу запрещ\
