            Страна производства в формате ISO 3166-1 alpha-2. [Как получить](../../reference/regions/getRegionsCodes.md)
          example: RU
          maxLength: 2
          minLength: 2
          pattern: "^[A-Z]{2}$"
          type: string
      type: object
