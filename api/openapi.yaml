    CalculateTariffsParametersDTO:
      description: Параметры для расчета стоимости услуг. Обязательно необходимо указать
        параметр `campaignId` либо `sellingProgram`. Совместное использование параметров
        приведет к ошибке.
      example:
        paymentDelayWeeks: 2
        campaignId: 1
        currency: RUR
        sellingProgram: FBY
        frequency: DAILY
      properties:
        campaignId:
          description: |
            Идентификатор кампании (магазина) — технический идентификатор, который представляет ваш магазин в системе Яндекс Маркета при работе через API. Он однозначно связывается с вашим магазином, но предназначен только для автоматизированного взаимодействия.

            Его можно узнать с помощью запроса [GET v2/campaigns](../../reference/campaigns/getCampaigns.md) или найти в кабинете продавца на Маркете. Нажмите на иконку вашего аккаунта → **Настройки** и в меню слева выберите **API и модули**:

            * блок **Идентификатор кампании**;
            * вкладка **Лог запросов** → выпадающий список в блоке **Показывать логи**.

            ⚠️ Не путайте его с:
            - идентификатором магазина, который отображается в личном кабинете продавца;
            - рекламными кампаниями.
          format: int64
          minimum: 1
          type: integer
        sellingProgram:
          $ref: "#/components/schemas/SellingProgramType"
        frequency:
          $ref: "#/components/schemas/PaymentFrequencyType"
        paymentDelayWeeks:
          description: |
            Отсрочка выплат при еженедельном графике — сколько недель назад были доставлены заказы, за которые приходит выплата.

            Допустимые значения: 0, 1, 2 или 4.

            Значения параметра `paymentDelayWeeks`, отличные от 0, допускаются только вместе с параметром `frequency` равным 'WEEKLY'.
            Использование других значений параметра `frequency` совместно с `paymentDelayWeeks` приведет к ошибке.
          format: int32
          maximum: 4
          minimum: 0
          type: integer
        currency:
          $ref: "#/components/schemas/CurrencyType"
      type: object
    CalculateTariffsOfferDTO:
      description: "Параметры товара, для которого нужно рассчитать стоимость услу\
