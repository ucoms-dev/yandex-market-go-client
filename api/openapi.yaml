      - NOT_READY
      type: string
    PickupAddressDTO:
      description: Адрес доставки.
      example:
        country: Россия
        city: Москва
        street: Стрелецкая улица
        postcode: "123518"
        house: 9к2
      properties:
        country:
          description: Страна.
          example: Россия
          type: string
        city:
          description: Город.
          example: Москва
          type: string
        street:
          description: Улица.
          example: Стрелецкая улица
          type: string
        house:
          description: Номер дома.
          example: 9к2
          type: string
        postcode:
          description: Почтовый индекс.
          example: "123518"
          type: string
      type: object
    LogisticPointType:
      description: |
        Тип логистической точки:

          * `WAREHOUSE` — склад.
          * `PICKUP_POINT` — обычная точка выдачи заказов (ПВЗ).
          * `PICKUP_TERMINAL` — постамат.
          * `PICKUP_POST_OFFICE` — отделение почтовой связи (ОПС).
          * `PICKUP_MIXED` — торговый зал и пункт выдачи заказов.
          * `PICKUP_RETAIL` — торговый зал.
      enum:
      - WAREHOUSE
      - PICKUP_POINT
      - PICKUP_TERMINAL
      - PICKUP_POST_OFFICE
      - PICKUP_MIXED
      - PICKUP_RETAIL
      type: string
    MarketSku:
      description: Идентификатор карточки товара на Маркете.
      format: int64
      minimum: 1
      type: integer
    ReturnDecisionDTO:
      description: Решения по возвратам.
      example:
        amount:
          currencyId: RUR
          value: 5.637376656633329
        images:
        - images
        - images
        returnItemId: 9
        subreasonType: USER_DID_NOT_LIKE
        count: 3
        partnerCompensationAmount:
          currencyId: RUR
          value: 5.637376656633329
        comment: comment
        decisionType: FAST_REFUND_MONEY
        reasonType: BAD_QUALITY
        partnerCompensation: 4
        refundAmount: 2
      properties:
        returnItemId:
          description: Идентификатор товара в возврате.
          format: int64
          type: integer
        count:
          description: Количество единиц товара.
          format: int32
          type: integer
        comment:
          description: Комментарий.
          type: string
        reasonType:
          $ref: "#/components/schemas/ReturnDecisionReasonType"
        subreasonType:
          $ref: "#/components/schemas/ReturnDecisionSubreasonType"
        decisionType:
          $ref: "#/components/schemas/ReturnDecisionType"
        refundAmount:
          deprecated: true
          description: |
            {% note warning "Вместо него используйте `amount`." %}

             

            {% endnote %}

            Сумма возврата в копейках.
          format: int64
          type: integer
        amount:
          $ref: "#/components/schemas/CurrencyValueDTO"
        partnerCompensation:
          deprecated: true
          description: |
            {% note warning "Вместо него используйте `partnerCompensationAmount`." %}

             

            {% endnote %}

            Компенсация за обратную доставку в копейках.
          format: int64
          type: integer
        partnerCompensationAmount:
          $ref: "#/components/schemas/CurrencyValueDTO"
        images:
          description: Список хеш-кодов фотографий товара от покупателя.
          items:
            type: string
          minItems: 1
          nullable: true
          type: array
          uniqueItems: true
      type: object
    ReturnInstanceDTO:
      description: Логистическая информация по возврату.
      example:
        stockType: FIT
        imei: imei
        cis: cis
        status: CREATED
      properties:
        stockType:
          $ref: "#/components/schemas/ReturnInstanceStockType"
        status:
          $ref: "#/components/schemas/ReturnInstanceStatusType"
        cis:
          description: "Код идентификации единицы товара в системе [«Честный ЗНАК»\
            ](https://честныйзнак.рф/) или [«ASL BELGISI»](https://aslbelgisi.uz)\
            \ (для продавцов :no-translate[Market Yandex Go])."
          type: string
        imei:
          description: Международный идентификатор мобильного оборудования.
          type: string
      type: object
    TrackDTO:
      description: Информация о трек-номерах.
      example:
        trackCode: trackCode
      properties:
        trackCode:
          description: Трек-код почтового отправления.
          type: string
      type: object
    ReturnDecisionType:
      description: |
        Решение по возврату:

        * `FAST_REFUND_MONEY` — вернуть покупателю деньги без возврата товара.

        * `REFUND_MONEY` — вернуть покупателю деньги за товар.

        * `REFUND_MONEY_INCLUDING_SHIPMENT` — вернуть покупателю деньги за товар и обратную пересылку.

        * `REPAIR` — отремонтировать товар.

        * `REPLACE` — заменить товар.

        * `SEND_TO_EXAMINATION` — взять товар на экспертизу.

        * `DECLINE_REFUND` — отказать в возврате.

        * `PARTIAL_MONEY_REFUND` — частичный возврат денег.

        * `OTHER_DECISION` — другое решение.

        * `UNKNOWN` — не указано.
      enum:
      - FAST_REFUND_MONEY
      - REFUND_MONEY
      - REFUND_MONEY_INCLUDING_SHIPMENT
      - REPAIR
      - REPLACE
      - SEND_TO_EXAMINATION
      - DECLINE_REFUND
      - PARTIAL_MONEY_REFUND
      - OTHER_DECISION
      - UNKNOWN
      type: string
    PartialCompensationBoundsDTO:
      description: |
        Пределы суммы частичной компенсации. Используется только в элементе с `decisionType` = `PARTIAL_MONEY_REFUND`.
      example:
        maxPercent: 0
        minAmount:
          currencyId: RUR
          value: 0.14658129805029452
        maxAmount:
          currencyId: RUR
          value: 0.14658129805029452
      properties:
        minAmount:
          $ref: "#/components/schemas/BasePriceDTO"
        maxAmount:
          $ref: "#/components/schemas/BasePriceDTO"
        maxPercent:
          description: "Верхний предел доли суммы позиции, которую можно компенсир\
            овать (в процентах)."
          format: int64
          type: integer
      required:
      - maxAmount
      - maxPercent
      - minAmount
      type: object
    ExternalReturnDecisionReasonType:
      description: |
        Причины возврата:

        * `BAD_QUALITY` — бракованный товар (есть недостатки).

        * `DOES_NOT_FIT` — товар не подошел.

        * `WRONG_ITEM` — привезли не тот товар.
      enum:
      - BAD_QUALITY
      - DOES_NOT_FIT
      - WRONG_ITEM
      type: string
    ExternalReturnDecisionSubreasonType:
      description: |
        Детали причин возврата:
          * `DOES_NOT_FIT`:
            * `USER_DID_NOT_LIKE` — товар не понравился.
            * `USER_CHANGED_MIND` — передумал покупать.
            * `DELIVERED_TOO_LONG` — передумал покупать из-за длительного срока доставки.

          * `BAD_QUALITY`:
            * `BAD_PACKAGE` — заводская упаковка повреждена.
            * `DAMAGED` — царапины, сколы.
            * `NOT_WORKING` — не включается, не работает.
            * `INCOMPLETENESS` — некомплект (не хватает детали в наборе, к товару).

          * `WRONG_ITEM`:
            * `WRONG_ITEM` — не тот товар.
            * `WRONG_COLOR` — цвет не соответствует заявленному.
            * `DID_NOT_MATCH_DESCRIPTION` — описание или характеристики не соответствуют заявленным.
      enum:
      - USER_DID_NOT_LIKE
      - USER_CHANGED_MIND
      - DELIVERED_TOO_LONG
      - BAD_PACKAGE
      - DAMAGED
      - NOT_WORKING
      - INCOMPLETENESS
      - WRONG_ITEM
      - WRONG_COLOR
      - DID_NOT_MATCH_DESCRIPTION
      type: string
    OrderPickupReturnDTO:
      description: |
        Информация о пункте выдачи, в который нужно вернуть товары.

        [Как получить список подходящих пунктов выдачи](../../reference/delivery-options/getReturnDeliveryOptions.md)
      example:
        logisticPointId: 1
      properties:
        logisticPointId:
          description: |
            Идентификатор пункта выдачи.

