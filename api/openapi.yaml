        benefits:
          description: |
            Список доступных субсидий.

            Чтобы получить необходимый инструмент продвижения, установите ставку, которая будет рекомендована для этого инструмента или выше.
          items:
            $ref: "#/components/schemas/BenefitType"
          minItems: 1
          nullable: true
          type: array
          uniqueItems: true
      required:
      - bid
      - showPercent
      type: object
    PriceRecommendationItemDTO:
      description: Рекомендованная цена.
      example:
        campaignId: 1
        price: 1.1465812980502945
      properties:
        campaignId:
          description: |
            Идентификатор кампании (магазина) — технический идентификатор, который представляет ваш магазин в системе Яндекс Маркета при работе через API. Он однозначно связывается с вашим магазином, но предназначен только для автоматизированного взаимодействия.

            Его можно узнать с помощью запроса [GET v2/campaigns](../../reference/campaigns/getCampaigns.md) или найти в кабинете продавца на Маркете. Нажмите на иконку вашего аккаунта → **Настройки** и в меню слева выберите **API и модули**:

            * блок **Идентификатор кампании**;
            * вкладка **Лог запросов** → выпадающий список в блоке **Показывать логи**.

            ⚠️ Не путайте его с:
            - идентификатором магазина, который отображается в личном кабинете продавца;
            - рекламными кампаниями.
          format: int64
          minimum: 1
          type: integer
        price:
          description: |
            Рекомендованная цена товара. Чтобы продвижение хорошо работало, цена товара должна быть не выше этого значения. [Подробно о рекомендованных ценах](https://yandex.ru/support/marketplace/marketing/campaigns.html#prices)
          minimum: 1
          type: number
      required:
      - campaignId
      - price
      type: object
    WarehouseAddressDTO:
      description: Адрес склада.
      example:
        number: number
        city: city
        street: street
        block: block
        gps:
          latitude: 9.369310271410669
          longitude: 6.683562403749608
        building: building
      properties:
        city:
          description: Город.
          maxLength: 200
          type: string
        street:
          description: Улица.
          maxLength: 512
          type: string
        number:
          description: Номер дома.
          maxLength: 256
          type: string
        building:
          description: Номер строения.
          maxLength: 16
          type: string
        block:
          description: Номер корпуса.
          maxLength: 16
          type: string
        gps:
          $ref: "#/components/schemas/GpsDTO"
      required:
