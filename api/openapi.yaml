    UinStatusType:
      description: |
        Статус проверки УИНа:

        * `FAILED` — не прошел проверку.

        * `IN_PROGRESS` — в процессе проверки.

        * `NOT_ON_VALIDATION` — УИН не отправлен на проверку или переданы не все УИНы в заказе.

        * `OK` — проверка успешно пройдена.
      enum:
      - OK
      - IN_PROGRESS
      - FAILED
      - NOT_ON_VALIDATION
      type: string
    UinSubstatusType:
      description: |
        Детализация ошибки при проверке :no-translate[УИНа].

        * `UIN_MERCHANT_MISMATCH` — :no-translate[УИН] не принадлежит вашему магазину.

        * `UIN_MERCHANT_UNREGISTERED` — магазин не подключен к системе :no-translate[ГИИС ДМДК].

        * `UIN_NO_DATA` — :no-translate[УИН] не найден или заблокирован.

        Возвращается только для статуса `FAILED`.
      enum:
      - UIN_MERCHANT_MISMATCH
      - UIN_MERCHANT_UNREGISTERED
      - UIN_NO_DATA
      type: string
    CisStatusType:
      description: |
        Статус проверки кода маркировки в системе :no-translate[«Честный ЗНАК»]:

        * `FAILED` — не удалось проверить код.

          Повторите попытку позже или удалите код маркировки.

        * `IN_PROGRESS` — в процессе проверки.

        * `NOT_ON_VALIDATION` — код маркировки не отправлен на проверку.

        * `OK` — проверка успешно пройдена.

        * `INVALID` — проверка не пройдена. Продажа товара с этим кодом запрещена.
      enum:
      - OK
      - FAILED
      - IN_PROGRESS
      - INVALID
      - NOT_ON_VALIDATION
      type: string
    CisSubstatusType:
      description: |
        Детализация ошибки при проверке кода маркировки в системе :no-translate[«Честный ЗНАК»]:

        * `WRONG_OWNER_INN` — проверка не пройдена. ИНН владельца кода отличается от ИНН продавца.

        * `CIS_VALIDATION_ERROR` — проверка не пройдена.

        * `CIS_GTIN_NOT_FOUND` — код маркировки не содержит [GTIN](:no-translate[*gtin]).

        * `CIS_SERIAL_NUMBER_NOT_FOUND` — код маркировки не содержит серийный номер.

        * `INVALID_SYMBOLS_FOUND` — код маркировки содержит недопустимые символы.

        * `CRYPTO_TAIL_FORMAT_MISMATCH_CIS_TYPE` — формат криптоподписи не соответствует типу кода маркировки.

        * `INVALID_CRYPTO_TAIL` — криптоподпись не валидна.

        * `INVALID_CRYPTO_KEY` — криптоключ не валиден.

        * `VERIFICATION_FAILED_IN_EMITTER_COUNTRY` — код маркировки не прошел верификацию в стране эмитента.

        * `UNSUPPORTED_AI_FOUND` — найденные в коде маркировки AI не поддерживаются.

        * `CIS_NOT_FOUND_IN_GIS_MT` — код маркировки не найден в :no-translate[ГИС МТ].

        * `NOT_PLACED_ON_MARKET` — код маркировки не введен в оборот.

        * `NOT_PRINTED_ON_PACKAGE` — код маркировки не нанесен на упаковку.

        * `EXPIRED_ITEM` — у маркированного товара истек срок годности.

        * `SALE_BLOCKED_BY_OGB` — розничная продажа продукции заблокирована по решению ОГВ.

        * `ITEM_SOLD` — маркированный товар был продан.

        Возвращается только для статуса `INVALID`.
      enum:
      - WRONG_OWNER_INN
      - CIS_VALIDATION_ERROR
      - CIS_GTIN_NOT_FOUND
      - CIS_SERIAL_NUMBER_NOT_FOUND
      - INVALID_SYMBOLS_FOUND
      - CRYPTO_TAIL_FORMAT_MISMATCH_CIS_TYPE
      - INVALID_CRYPTO_TAIL
      - INVALID_CRYPTO_KEY
      - VERIFICATION_FAILED_IN_EMITTER_COUNTRY
      - UNSUPPORTED_AI_FOUND
      - CIS_NOT_FOUND_IN_GIS_MT
      - NOT_PLACED_ON_MARKET
      - NOT_PRINTED_ON_PACKAGE
      - EXPIRED_ITEM
      - SALE_BLOCKED_BY_OGB
      - ITEM_SOLD
      type: string
    CourierDeliveryAddressDTO:
      allOf:
      - $ref: "#/components/schemas/BasicCourierDeliveryAddressDTO"
      - properties:
          entrance:
            description: Номер подъезда.
            maxLength: 16
            minLength: 1
            type: string
          floor:
            description: Этаж.
            format: int32
            type: integer
          apartment:
            description: Номер квартиры или офиса.
            maxLength: 16
            minLength: 1
            type: string
        type: object
      description: Адрес доставки.
      example:
        fullAddress: fullAddress
        entrance: entrance
        floor: 5
        apartment: apartment
      type: object
    ReturnDecisionReasonType:
      description: |
        Причины возврата:

        * `BAD_QUALITY` — бракованный товар (есть недостатки).

        * `DOES_NOT_FIT` — товар не подошел.

        * `WRONG_ITEM` — привезли не тот товар.

        * `DAMAGE_DELIVERY` — товар поврежден при доставке.

        * `LOYALTY_FAIL` — невозможно установить виновного в браке/пересорте.

        * `CONTENT_FAIL` — ошибочное описание товара по вине Маркета.

        * `DELIVERY_FAIL` — товар не привезли.

        * `UNKNOWN` — причина не известна.
      enum:
      - BAD_QUALITY
      - DOES_NOT_FIT
      - WRONG_ITEM
      - DAMAGE_DELIVERY
      - LOYALTY_FAIL
      - CONTENT_FAIL
      - DELIVERY_FAIL
      - UNKNOWN
      type: string
    ReturnDecisionSubreasonType:
      description: |
        Детали причин возврата:
          * `DOES_NOT_FIT`:
            * `USER_DID_NOT_LIKE` — товар не понравился.
            * `USER_CHANGED_MIND` — передумал покупать.
            * `DELIVERED_TOO_LONG` — передумал покупать из-за длительного срока доставки.

          * `BAD_QUALITY`:
            * `BAD_PACKAGE` — заводская упаковка повреждена.
            * `DAMAGED` — царапины, сколы.
            * `NOT_WORKING` — не включается, не работает.
            * `INCOMPLETENESS` — некомплект (не хватает детали в наборе, к товару).
            * `WRAPPING_DAMAGED` — транспортная упаковка повреждена.
            * `ITEM_WAS_USED` — следы использования на товаре.
            * `BROKEN` — товар разбит.
            * `BAD_FLOWERS` — некачественные цветы.

          * `WRONG_ITEM`:
            * `WRONG_ITEM` — не тот товар.
            * `WRONG_COLOR` — цвет не соответствует заявленному.
            * `DID_NOT_MATCH_DESCRIPTION` — описание или характеристики не соответствуют заявленным.
            * `WRONG_ORDER` — доставили чужой заказ.
            * `WRONG_AMOUNT_DELIVERED` — неверное количество товара.
            * `PARCEL_MISSING` — часть заказа отсутствует.
            * `INCOMPLETE` — заказ не привезли полностью.

          * `UNKNOWN` — детали причины не указаны.
      enum:
      - USER_DID_NOT_LIKE
      - USER_CHANGED_MIND
      - DELIVERED_TOO_LONG
      - BAD_PACKAGE
      - DAMAGED
      - NOT_WORKING
      - INCOMPLETENESS
      - WRONG_ITEM
      - WRONG_COLOR
      - DID_NOT_MATCH_DESCRIPTION
      - WRONG_ORDER
      - WRONG_AMOUNT_DELIVERED
      - WRAPPING_DAMAGED
      - ITEM_WAS_USED
      - BROKEN
      - BAD_FLOWERS
      - PARCEL_MISSING
      - INCOMPLETE
      - UNKNOWN
      type: string
    ReturnInstanceStockType:
      description: |
        Тип остатка на складе:

        * `FIT` — годный.

        * `DEFECT` — бракованный.

        * `ANOMALY` — аномалия.

        * `SURPLUS` — лишний.

        * `EXPIRED` — просроченный.

        * `MISGRADING` — пересортица.

        * `UNDEFINED` — с неизвестным статусом.

        * `INCORRECT_IMEI` — товар с некорректным [IMEI](https://ru.wikipedia.org/wiki/IMEI).

        * `INCORRECT_SERIAL_NUMBER` — товар с некорректным серийным номером.

        * `INCORRECT_CIS` — товар с некорректным кодом идентификации единицы товара в системе [«Честный ЗНАК»](https://честныйзнак.рф/) или [«ASL BELGISI»](https://aslbelgisi.uz) (для продавцов :no-translate[Market Yandex Go]).

        * `PART_MISSING` — недостача.

        * `NON_COMPLIENT` — товар с множественными несоответствиями.

        * `NOT_ACCEPTABLE` — товар, который Маркет не принимает.

        * `SERVICE` — сервисный сток.

        * `MARKDOWN` — уценка.

        * `DEMO` — демо.

        * `REPAIR` — ремонт.

        * `FIRMWARE` — прошивка.

        * `UNKNOWN` — неизвестный тип товара.
      enum:
      - FIT
      - DEFECT
      - ANOMALY
      - SURPLUS
      - EXPIRED
      - MISGRADING
      - UNDEFINED
      - INCORRECT_IMEI
      - INCORRECT_SERIAL_NUMBER
      - INCORRECT_CIS
      - PART_MISSING
      - NON_COMPLIENT
      - NOT_ACCEPTABLE
      - SERVICE
      - MARKDOWN
      - DEMO
      - REPAIR
      - FIRMWARE
      - UNKNOWN
      type: string
    ReturnInstanceStatusType:
      description: |
        Логистический статус конкретного товара:

        * `CREATED` — возврат создан.

        * `RECEIVED` — возврат принят у отправителя.

        * `IN_TRANSIT` — возврат в пути.

        * `READY_FOR_PICKUP` — возврат готов к выдаче магазину.

        * `PICKED` — возврат выдан магазину.

        * `RECEIVED_ON_FULFILLMENT` — возврат принят на складе Маркета.

        * `CANCELLED` — возврат отменен.

        * `LOST` — возврат утерян.

        * `UTILIZED` — возврат утилизирован.

        * `PREPARED_FOR_UTILIZATION` — возврат готов к утилизации.

        * `EXPROPRIATED` — товары в возврате направлены на перепродажу.

        * `NOT_IN_DEMAND` — возврат не забрали с почты.
      enum:
      - CREATED
      - RECEIVED
      - IN_TRANSIT
      - READY_FOR_PICKUP
      - PICKED
      - RECEIVED_ON_FULFILLMENT
      - CANCELLED
      - LOST
      - UTILIZED
      - PREPARED_FOR_UTILIZATION
      - EXPROPRIATED
      - NOT_IN_DEMAND
      type: string
    BaseOfferResponseDTO:
      description: Основные параметры товара.
      properties:
        offerId:
          description: |
            Ваш SKU — идентификатор товара в вашей системе.

            Правила использования SKU:

            * У каждого товара SKU должен быть свой.

            * Уже заданный SKU нельзя освободить и использовать заново для другого товара. Каждый товар должен получать новый идентификатор, до того никогда не использовавшийся в вашем каталоге.

            SKU товара можно изменить в кабинете продавца на Маркете. О том, как это сделать, читайте [в Справке Маркета для продавцов](https://yandex.ru/support2/marketplace/ru/assortment/operations/edit-sku).

            {% note warning %}

            Пробельные символы в начале и конце значения автоматически удаляются. Например, `"  SKU123  "` и `"SKU123"` будут обработаны как одинаковые значения.

            {% endnote %}

            [Что такое SKU и как его назначать](https://yandex.ru/support/marketplace/assortment/add/index.html#fields)
          maxLength: 255
          minLength: 1
          pattern: "^(?=.*\\S.*)[^\\x00-\\x08\\x0A-\\x1f\\x7f]{1,255}$"
          type: string
          x-transform: trim
        name:
          description: |
            Составляйте название по схеме: тип + бренд или производитель + модель + особенности, если есть (например, цвет, размер или вес) и количество в упаковке.

            Не включайте в название условия продажи (например, «скидка», «бесплатная доставка» и т. д.), эмоциональные характеристики («хит», «супер» и т. д.). Не пишите слова большими буквами — кроме устоявшихся названий брендов и моделей.

            Оптимальная длина — 50–60 символов.

            [Рекомендации и правила](https://yandex.ru/support/marketplace/assortment/fields/title.html)
          example: "Ударная дрель Makita HP1630, 710 Вт"
          type: string
        marketCategoryId:
          description: |
            Идентификатор категории на Маркете, к которой вы относите свой товар.

            {% note warning "Всегда указывайте, когда передаете `parameterValues`" %}

            Если при изменении характеристик передать `parameterValues` и не указать `marketCategoryId`, характеристики обновятся, но в ответе придет предупреждение (параметр `warnings`).

            Если не передать их оба, будет использована информация из устаревших параметров `params` и `category`, а `marketCategoryId` будет определен автоматически.

            {% endnote %}

            При изменении категории убедитесь, что характеристики товара и их значения в параметре `parameterValues` вы передаете для новой категории.

            Список категорий Маркета можно получить с помощью запроса  [POST v2/categories/tree](../../reference/categories/getCategoriesTree.md).
          exclusiveMinimum: true
          format: int64
          minimum: 0
          type: integer
        category:
          deprecated: true
          description: |
            {% note warning "Вместо него используйте `marketCategoryId`." %}

             

            {% endnote %}

            Категория товара в вашем магазине.
          type: string
        pictures:
          description: |
            Ссылки на изображения товара. Изображение по первой ссылке считается основным, остальные дополнительными.

            **Требования к ссылкам**

            * Ссылок может быть до 30.
            * Указывайте ссылку целиком, включая протокол http или https.
            * Максимальная длина — 512 символов.
            * Русские буквы в URL можно.
            * Можно использовать прямые ссылки на изображения и на Яндекс Диск. Ссылки на Яндекс Диске нужно копировать с помощью функции **Поделиться**. Относительные ссылки и ссылки на другие облачные хранилища — не работают.

            ✅ `https://example-shop.ru/images/sku12345.jpg`

