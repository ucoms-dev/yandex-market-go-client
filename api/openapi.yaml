            Один раз дату можно поменять с помощью метода [PUT v2/campaigns/{campaignId}/orders/{orderId}/delivery/storage-limit](../../reference/orders/updateOrderStorageLimit.md).

            Формат даты: `ГГГГ-ММ-ДД`.
          format: date
