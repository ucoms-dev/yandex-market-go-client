    ReportInfoDTO:
      description: Статус генерации и ссылка на готовый отчет или документ.
      example:
        generationRequestedAt: 2000-01-23T04:56:07.000+00:00
        file: file
        generationFinishedAt: 2000-01-23T04:56:07.000+00:00
        subStatus: NO_DATA
        status: PENDING
        estimatedGenerationTime: 0
      properties:
        status:
          $ref: "#/components/schemas/ReportStatusType"
        subStatus:
          $ref: "#/components/schemas/ReportSubStatusType"
        generationRequestedAt:
          description: Дата и время запроса на генерацию.
          format: date-time
          type: string
        generationFinishedAt:
          description: Дата и время завершения генерации.
          format: date-time
          type: string
        file:
          description: |
            Ссылка на готовый отчет или документ.

            {% note warning "Срок действия ссылки" %}

            Ссылка актуальна **60 минут** с момента получения ответа. При каждом запросе `GET /v2/reports/info/{reportId}` генерируется новая ссылка, срок действия которой ограничен.

            **Рекомендация для интеграций:** сразу после получения ссылки скачайте отчет и сохраните его у себя. Не сохраняйте ссылку для последующего использования — она станет недействительной через после истечения срока действия.

            {% endnote %}
          type: string
        estimatedGenerationTime:
          description: Ожидаемая продолжительность генерации в миллисекундах.
          format: int64
          type: integer
      required:
      - generationRequestedAt
      - status
      type: object
    BusinessId:
      description: |
        Идентификатор кабинета. {% if audience == "partner" %}Чтобы его узнать, воспользуйтесь запросом [GET v2/campaigns](../../reference/campaigns/getCampaigns.md).

        ℹ️ [Что такое кабинет и магазин на Маркете](https://yandex.ru/support/marketplace/account/introduction.html)
        {% endif %}
      format: int64
      minimum: 1
      type: integer
    PeriodDateFrom:
      description: |
        Начало периода, включительно.

        Формат даты: `ГГГГ-ММ-ДД`.
      example: 2025-08-22
      format: date
      type: string
    MonthOfYearDTO:
      description: "Месяц, за который нужен отчет о баллах Маркета."
      example:
        month: 12
        year: 2025
      properties:
        year:
          description: Год.
          example: 2025
          format: int32
          type: integer
        month:
          description: Номер месяца.
          example: 12
          format: int32
          maximum: 12
          minimum: 1
          type: integer
      required:
      - month
      - year
      type: object
    PlacementType:
      description: |
        Модель, по которой работает магазин:

        * `FBS` — FBS или Экспресс.
        * `FBY` — FBY.
        * `DBS` — DBS.
        * `LAAS` — LaaS.
      enum:
      - FBS
      - FBY
      - DBS
      - LAAS
      type: string
    GenerateReportDTO:
      description: "Идентификатор, который понадобится для отслеживания статуса ге\
        нерации и получения готового отчета или документа."
      example:
        reportId: reportId
        estimatedGenerationTime: 0
      properties:
        reportId:
          description: "Идентификатор, который понадобится для отслеживания статус\
            а генерации и получения готового отчета или документа."
          type: string
        estimatedGenerationTime:
          description: Ожидаемая продолжительность генерации в миллисекундах.
          format: int64
          type: integer
      required:
      - estimatedGenerationTime
      - reportId
      type: object
    Year:
      description: Год.
      example: 2025
      format: int32
      type: integer
    Month:
      description: Номер месяца.
      example: 12
      format: int32
      maximum: 12
      minimum: 1
      type: integer
    PeriodDateTo:
      description: |
        Конец периода, включительно.

        Формат даты: `ГГГГ-ММ-ДД`.
      example: 2025-09-22
      format: date
      type: string
    ShowsSalesGroupingType:
      description: |
        Группировка данных отчета.
        Возможные значения:
        * `CATEGORIES` — группировка по категориям.
        * `OFFERS` — группировка по товарам.
      enum:
      - CATEGORIES
      - OFFERS
      type: string
    StatisticsAttributionType:
      description: |
        Тип атрибуции:
          * `CLICKS` — по кликам.
          * `SHOWS` — по показам.
        {% if audience == "partner" %}
        <br><br>

        О том, какие данные в отчете зависят и не зависят от типа атрибуции, читайте [в Справке Маркета для продавцов](https://yandex.ru/support2/marketplace/ru/marketing/shelf#stats).
        {% endif %}
      enum:
      - CLICKS
      - SHOWS
      type: string
    LabelsSortingType:
      description: |
        Тип сортировки ярлыков:

        * `SORT_BY_GIVEN_ORDER` — ярлыки заказов будут расположены в том же порядке, в каком были переданы идентификаторы заказов в запросе.
        * `SORT_BY_ORDER_CREATED_AT` — ярлыки будут расположены в соответствии с датой создания заказа с группировкой по магазинам.

        Если параметр не указан, ярлыки сортируются по дате создания.
      enum:
      - SORT_BY_GIVEN_ORDER
      - SORT_BY_ORDER_CREATED_AT
      type: string
    ClosureDocumentsMonthOfYearDTO:
      description: |
        Месяц и год.
      example:
        month: 12
        year: 2025
      properties:
        year:
          description: Год.
          example: 2025
          format: int32
          type: integer
        month:
          description: Номер месяца.
          example: 12
          format: int32
          maximum: 12
          minimum: 1
          type: integer
      required:
      - month
      - year
      type: object
    ClosureDocumentsContractType:
      description: |
        Тип договора:

        * `INCOME` — договор на размещение.

        * `OUTCOME` — договор на продвижение.

        * `MARKETING` — договор на маркетинг.
      enum:
      - INCOME
      - OUTCOME
      - MARKETING
      type: string
    KeyIndicatorsReportDetalizationLevelType:
      description: |
        За какой период нужна детализация:

        * `WEEK` — по неделям.

        * `MONTH` — по месяцам.
      enum:
      - WEEK
      - MONTH
      type: string
    BarcodeFormatType:
      description: |
        Формат страницы и размер штрихкодов:

        * `F_30_20` — А4, штрихкоды размера 30 × 20 мм.
        * `F_43_25` — А4, штрихкоды размера 43 × 25 мм.
        * `F_58_40` — А4, штрихкоды размера 58 × 40 мм.
        * `F_43_25_SINGLE` — для печати этикеток.
      enum:
      - F_30_20
      - F_43_25
      - F_58_40
      - F_43_25_SINGLE
      type: string
    BarcodeOfferInfoDTO:
      description: Информация о штрихкодах.
      example:
        offerId: offerId
        barcodeCount: 60
      properties:
        offerId:
          description: |
            Ваш SKU — идентификатор товара в вашей системе.

            Правила использования SKU:

            * У каждого товара SKU должен быть свой.

            * Уже заданный SKU нельзя освободить и использовать заново для другого товара. Каждый товар должен получать новый идентификатор, до того никогда не использовавшийся в вашем каталоге.

            SKU товара можно изменить в кабинете продавца на Маркете. О том, как это сделать, читайте [в Справке Маркета для продавцов](https://yandex.ru/support2/marketplace/ru/assortment/operations/edit-sku).

            {% note warning %}

            Пробельные символы в начале и конце значения автоматически удаляются. Например, `"  SKU123  "` и `"SKU123"` будут обработаны как одинаковые значения.

            {% endnote %}

            [Что такое SKU и как его назначать](https://yandex.ru/support/marketplace/assortment/add/index.html#fields)
          maxLength: 255
          minLength: 1
          pattern: "^(?=.*\\S.*)[^\\x00-\\x08\\x0A-\\x1f\\x7f]{1,255}$"
          type: string
          x-transform: trim
        barcodeCount:
          description: Количество штрихкодов для печати.
          format: int64
          maximum: 100
          minimum: 1
          type: integer
      required:
      - barcodeCount
      - offerId
      type: object
    SupplyRequestId:
      description: |
        Идентификатор заявки.

        {% note warning "Используется только в API" %}

        По нему не получится найти заявки в кабинете продавца на Маркете. Для этого используйте `marketplaceRequestId` или `warehouseRequestId`.

        {% endnote %}
      format: int64
      minimum: 1
      type: integer
