        Тип субсидии:

        * `YANDEX_CASHBACK` — скидка по подписке Яндекс Плюс.

        * `SUBSIDY` — скидка Маркета (по акциям, промокодам, купонам и т. д.).
      enum:
      - YANDEX_CASHBACK
      - SUBSIDY
      type: string
    GpsDTO:
      description: |
        GPS-координаты широты и долготы.
      example:
