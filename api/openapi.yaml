          Между начальной (параметр `updatedAtFrom`) и конечной датой должно быть не больше 30 дней.

          Конечная дата не включается в интервал для фильтрации.
        explode: true
        in: query
        name: updatedAtTo
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: Способ отгрузки
