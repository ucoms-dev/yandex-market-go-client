    UpdateGoodsQuestionTextEntityRequest:
      description: |
        Запрос на создание, обновление или удаление вопроса, ответа или комментария.

        **Параметры для разных операций:**

        * `CREATE` — создание ответа или комментария:
          * Обязательно: `operationType`, `parentEntityId`, `text`.
          * `parentEntityId` — идентификатор родителя (для ответа — вопроса, для комментария — ответа).

        * `UPDATE` — обновление ответа или комментария:
          * Обязательно: `operationType`, `entityId`, `text`.
          * `entityId` — идентификатор ответа или комментария.

        * `DELETE` — удаление ответа или комментария:
          * Обязательно: `operationType`, `entityId`.
          * `text` не требуется.
      example:
        entityId:
          id: 1
          type: QUESTION
        operationType: UPDATE
        parentEntityId:
          id: 1
          type: QUESTION
        text: text
      properties:
        entityId:
          $ref: "#/components/schemas/TypedQuestionsTextEntityIdDTO"
        parentEntityId:
          $ref: "#/components/schemas/TypedQuestionsTextEntityIdDTO"
        text:
          description: |
            Текстовое содержимое.
          maxLength: 5000
          minLength: 1
          type: string
        operationType:
          $ref: "#/components/schemas/QuestionsTextEntityOperationType"
      required:
      - operationType
      type: object
    UpdateGoodsQuestionTextEntityResponse:
      allOf:
      - $ref: "#/components/schemas/ApiResponse"
      - properties:
          result:
            $ref: "#/components/schemas/UpdateGoodsQuestionTextEntityDTO"
        type: object
      description: |
        Ответ на запрос создания, обновления или удаления вопроса, ответа или комментария.
      example:
        result:
          entity:
            id: 1
            type: QUESTION
        status: OK
      type: object
