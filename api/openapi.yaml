        toDate: 2000-01-23
      properties:
        fromDate:
          description: |
            Начало интервала.

            Формат даты: `ГГГГ-ММ-ДД`.
          format: date
          type: string
        toDate:
          description: |
            Конец интервала.

            Формат даты: `ГГГГ-ММ-ДД`.
          format: date
          type: string
      required:
      - fromDate
      - toDate
      type: object
    TimeIntervalDTO:
      description: Интервал времени доставки.
      example:
        fromTime: fromTime
        toTime: toTime
      properties:
        fromTime:
          description: |
            Начало интервала.

            Формат: `ЧЧ:ММ`.
          pattern: "^([0-1][0-9]|2[0-3]):[0-5][0-9]$"
          type: string
        toTime:
          description: |
            Конец интервала.

            Формат: `ЧЧ:ММ`.
          pattern: "^([0-1][0-9]|2[0-3]):[0-5][0-9]$"
          type: string
      required:
      - fromTime
      - toTime
      type: object
    OrderPickupDeliveryDTO:
      description: |
        Информация о доставке в пункт выдачи.

        Не передавайте вместе с `courierDelivery`.
      example:
        logisticPointId: 1
      properties:
