        * `WHITELABEL` — коробка.

        * `BRAND` — [брендированная упаковка](*brand-package) магазина.

        Если не передать `packageType`, заказ приедет в коробке или без упаковки.
      enum:
      - WHITELABEL
      - BRAND
      type: string
    OrderDocumentStatusType:
      description: |
