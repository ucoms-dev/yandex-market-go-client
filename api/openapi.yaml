        Возможные значения:

        * `HIDDEN` — точка продаж выключена.
        * `VISIBLE` — точка продаж включена.
        * `UNKNOWN` — неизвестное состояние точки продажи. При определении состояния произошла ошибка.
      enum:
      - HIDDEN
      - VISIBLE
      - UNKNOWN
      type: string
