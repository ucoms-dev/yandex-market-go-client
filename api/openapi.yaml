  /v2/campaigns/{campaignId}/outlets:
    get:
      description: |
        {% include notitle [access](../../_auto/method_scopes/getOutlets.md) %}

        Возвращает список точек продаж магазина.

        {% include notitle [limit](../../_auto/method_limits/getOutlets.md) %}
      operationId: getOutlets
      parameters:
      - description: |
          Идентификатор кампании (магазина) — технический идентификатор, который представляет ваш магазин в системе Яндекс Маркета при работе через API. Он однозначно связывается с вашим магазином, но предназначен только для автоматизированного взаимодействия.

          Его можно узнать с помощью запроса [GET v2/campaigns](../../reference/campaigns/getCampaigns.md) или найти в кабинете продавца на Маркете. Нажмите на иконку вашего аккаунта → **Настройки** и в меню слева выберите **API и модули**:

          * блок **Идентификатор кампании**;
          * вкладка **Лог запросов** → выпадающий список в блоке **Показывать логи**.

          ⚠️ Не путайте его с:
          - идентификатором магазина, который отображается в личном кабинете продавца;
          - рекламными кампаниями.
        explode: false
        in: path
        name: campaignId
        required: true
        schema:
          format: int64
          minimum: 1
          type: integer
        style: simple
      - description: |
          Идентификатор страницы c результатами.

          Если параметр не указан, возвращается первая страница.

          Передавайте значение выходного параметра `nextPageToken`, полученное при последнем запросе.
        explode: true
        in: query
        name: pageToken
        required: false
        schema:
          type: string
        style: form
        x-transform: token
        x-aliases:
        - pageToken
        - page_token
      - description: |
          {{ limit-param-description }}
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 25
          format: int32
          maximum: 50
          minimum: 1
          type: integer
        style: form
      - description: |
          Идентификатор региона.
          Если задать идентификатор родительского региона любого уровня, в выходных данных будут отображены точки продаж всех дочерних регионов.
          Идентификатор региона можно получить c помощью метода [GET v2/regions](../../reference/regions/searchRegionsByName.md).
