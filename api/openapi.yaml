openapi: 3.0.3
info:
  description: |
    API Яндекс Маркета помогает продавцам автоматизировать и упростить работу с маркетплейсом.

    В числе возможностей интеграции:

    * управление каталогом товаров и витриной,

    * обработка заказов,

    * изменение настроек магазина,

    * получение отчетов.
  license:
    name: BSD 3-Clause
    url: https://opensource.org/license/bsd-3-clause/
  title: API Яндекс Маркета для продавцов
  version: LATEST
externalDocs:
  description: Документация API
  url: https://yandex.ru/dev/market/partner-api/doc/
servers:
- url: https://api.partner.market.yandex.ru
security:
- ApiKey: []
- OAuth:
  - market:partner-api
paths:
  /v2/businesses/{businessId}/settings:
    post:
      description: |
        {% include notitle [access](../../_auto/method_scopes/getBusinessSettings.md) %}

        Возвращает информацию о настройках кабинета, идентификатор которого указан в запросе.

        {% include notitle [limit](../../_auto/method_limits/getBusinessSettings.md) %}
      operationId: getBusinessSettings
      parameters:
      - description: |
          Идентификатор кабинета. Чтобы его узнать, воспользуйтесь запросом [GET v2/campaigns](../../reference/campaigns/getCampaigns.md).

          ℹ️ [Что такое кабинет и магазин на Маркете](https://yandex.ru/support/marketplace/account/introduction.html)
        explode: false
        in: path
        name: businessId
        required: true
        schema:
          format: int64
          minimum: 1
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBusinessSettingsResponse"
          description: Настройки кабинета.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiClientDataErrorResponse"
          description: "Запрос содержит неправильные данные. [Подробнее об ошибке\
            ](../../concepts/error-codes.md#400)"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiUnauthorizedErrorResponse"
          description: "В запросе не указаны данные для авторизации. [Подробнее об\
            \ ошибке](../../concepts/error-codes.md#401)"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiForbiddenErrorResponse"
          description: "Данные для авторизации неверны или доступ к ресурсу запрещ\
            ен. [Подробнее об ошибке](../../concepts/error-codes.md#403)"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiNotFoundErrorResponse"
          description: "Запрашиваемый ресурс не найден. [Подробнее об ошибке](../../concepts/error-codes.md#404)"
        "420":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiLimitErrorResponse"
          description: "Превышено ограничение на доступ к ресурсу. [Подробнее об о\
            шибке](../../concepts/error-codes.md#420)"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiServerErrorResponse"
          description: "Внутренняя ошибка Маркета. [Подробнее об ошибке](../../concepts/error-codes.md#500)"
      summary: Настройки кабинета
      tags:
      - businesses
      - dbs
      - fbs
      - fby
      - express
      - laas
      x-auth-scopes:
      - all-methods
      - all-methods:read-only
      - settings-management
      - finance-and-accounting
      - offers-and-cards-management
      - offers-and-cards-management:read-only
      - pricing
      - pricing:read-only
      - inventory-and-order-processing
      - inventory-and-order-processing:read-only
      - promotion
      - promotion:read-only
      - communication
      - supplies-management:read-only
      x-restrictions:
      - urbanads
      x-resource-limit-config:
        path: resp
        amount: 1000
        period: hours
        tariff-resource-limits:
          none:
            amount: 100
            period: hours
            period-duration: 1
          medium:
            amount: 100
            period: hours
            period-duration: 1
      x-apphost:
        domain: BASE
        enabled: false
  /v2/campaigns:
    get:
      description: |
        {% include notitle [access](../../_auto/method_scopes/getCampaigns.md) %}

        **Для Api-Key-токена:** возвращает список магазинов в кабинете, для которого выдан токен. Нельзя получить список только подагентских магазинов.

        **Для OAuth-токена:** возвращает список магазинов, к которым имеет доступ пользователь — владелец токена авторизации, использованного в запросе. Для агентских пользователей список состоит из подагентских магазинов.

        {% note warning "Ограничение для параметра `pageSize`" %}

        Не передавайте значение больше 100.

        {% endnote %}

        {% include notitle [limit](../../_auto/method_limits/getCampaigns.md) %}
      operationId: getCampaigns
      parameters:
      - description: |
          Идентификатор страницы c результатами.

          Если параметр не указан, возвращается первая страница.

          Передавайте значение выходного параметра `nextPageToken`, полученное при последнем запросе.
        explode: true
        in: query
        name: pageToken
        required: false
        schema:
          type: string
        style: form
        x-transform: token
        x-aliases:
        - pageToken
        - page_token
      - description: |
          {{ limit-param-description }}

          {% note warning %}

          У данного лимита нет значения по умолчанию.

          {% endnote %}
        explode: true
        in: query
        name: limit
        required: false
        schema:
          format: int32
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - deprecated: true
        description: |
          {% note warning "Устаревший параметр" %}

          Вместо `page` и `pageSize` используйте пагинацию по `pageToken` и `limit`.

          [Подробнее о типах пагинации и их использовании](../../concepts/pagination.md)

          {% endnote %}

          Номер страницы результатов.

          Используется вместе с параметром `pageSize`.
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          format: int32
          maximum: 10000
          type: integer
        style: form
      - deprecated: true
        description: |
          {% note warning "Устаревший параметр" %}

          Вместо `page` и `pageSize` используйте пагинацию по `pageToken` и `limit`.

          [Подробнее о типах пагинации и их использовании](../../concepts/pagination.md)

          {% endnote %}

          Размер страницы.

          Используется вместе с параметром `page`.
        explode: true
        in: query
        name: pageSize
        required: false
        schema:
          format: int32
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCampaignsResponse"
          description: Магазины пользователя.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiClientDataErrorResponse"
          description: "Запрос содержит неправильные данные. [Подробнее об ошибке\
            ](../../concepts/error-codes.md#400)"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiUnauthorizedErrorResponse"
          description: "В запросе не указаны данные для авторизации. [Подробнее об\
            \ ошибке](../../concepts/error-codes.md#401)"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiForbiddenErrorResponse"
          description: "Данные для авторизации неверны или доступ к ресурсу запрещ\
            ен. [Подробнее об ошибке](../../concepts/error-codes.md#403)"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiNotFoundErrorResponse"
          description: "Запрашиваемый ресурс не найден. [Подробнее об ошибке](../../concepts/error-codes.md#404)"
        "420":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiLimitErrorResponse"
          description: "Превышено ограничение на доступ к ресурсу. [Подробнее об о\
            шибке](../../concepts/error-codes.md#420)"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiServerErrorResponse"
          description: "Внутренняя ошибка Маркета. [Подробнее об ошибке](../../concepts/error-codes.md#500)"
      summary: Список магазинов пользователя
      tags:
      - campaigns
      - dbs
      - express
      - fbs
      - fby
      - laas
      x-auth-scopes:
      - all-methods
      - all-methods:read-only
      - settings-management
      - finance-and-accounting
      - offers-and-cards-management
      - offers-and-cards-management:read-only
      - pricing
      - pricing:read-only
      - inventory-and-order-processing
      - inventory-and-order-processing:read-only
      - promotion
      - promotion:read-only
      - communication
      - supplies-management:read-only
      x-restrictions:
      - urbanads
      x-resource-limit-config:
        path: resp
        amount: 5000
        period: hours
        tariff-resource-limits:
          none:
            amount: 1000
            period: hours
            period-duration: 1
          medium:
            amount: 1000
            period: hours
            period-duration: 1
      x-apphost:
        domain: BASE
        enabled: false
  /v2/campaigns/{campaignId}:
    get:
      description: |
        {% include notitle [access](../../_auto/method_scopes/getCampaign.md) %}

        Возвращает информацию о магазине.

        {% include notitle [limit](../../_auto/method_limits/getCampaign.md) %}
      operationId: getCampaign
      parameters:
      - description: |
          Идентификатор кампании (магазина) — технический идентификатор, который представляет ваш магазин в системе Яндекс Маркета при работе через API. Он однозначно связывается с вашим магазином, но предназначен только для автоматизированного взаимодействия.

          Его можно узнать с помощью запроса [GET v2/campaigns](../../reference/campaigns/getCampaigns.md) или найти в кабинете продавца на Маркете. Нажмите на иконку вашего аккаунта → **Настройки** и в меню слева выберите **API и модули**:

          * блок **Идентификатор кампании**;
          * вкладка **Лог запросов** → выпадающий список в блоке **Показывать логи**.

          ⚠️ Не путайте его с:
          - идентификатором магазина, который отображается в личном кабинете продавца;
          - рекламными кампаниями.
        explode: false
        in: path
        name: campaignId
        required: true
        schema:
          format: int64
          minimum: 1
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCampaignResponse"
          description: Информация о магазине.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiClientDataErrorResponse"
          description: "Запрос содержит неправильные данные. [Подробнее об ошибке\
            ](../../concepts/error-codes.md#400)"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiUnauthorizedErrorResponse"
          description: "В запросе не указаны данные для авторизации. [Подробнее об\
            \ ошибке](../../concepts/error-codes.md#401)"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiForbiddenErrorResponse"
          description: "Данные для авторизации неверны или доступ к ресурсу запрещ\
            ен. [Подробнее об ошибке](../../concepts/error-codes.md#403)"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiNotFoundErrorResponse"
          description: "Запрашиваемый ресурс не найден. [Подробнее об ошибке](../../concepts/error-codes.md#404)"
        "420":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiLimitErrorResponse"
          description: "Превышено ограничение на доступ к ресурсу. [Подробнее об о\
            шибке](../../concepts/error-codes.md#420)"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiServerErrorResponse"
          description: "Внутренняя ошибка Маркета. [Подробнее об ошибке](../../concepts/error-codes.md#500)"
      summary: Информация о магазине
      tags:
      - campaigns
      - dbs
      - express
      - fbs
      - fby
      - laas
      x-auth-scopes:
      - all-methods
      - all-methods:read-only
      - settings-management
      - finance-and-accounting
      - offers-and-cards-management
      - offers-and-cards-management:read-only
      - pricing
      - pricing:read-only
      - inventory-and-order-processing
      - inventory-and-order-processing:read-only
      - promotion
      - promotion:read-only
      - communication
      - supplies-management:read-only
      x-restrictions:
      - urbanads
      x-resource-limit-config:
        path: resp
        amount: 5000
        period: hours
        tariff-resource-limits:
          none:
            amount: 5000
            period: hours
            period-duration: 1
          medium:
            amount: 5000
            period: hours
            period-duration: 1
      x-apphost:
        domain: BASE
        enabled: false
