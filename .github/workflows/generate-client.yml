name: Generate Go client

on:
  push:
    branches:
      - main
    paths:
      - api/**
      - generation.yaml
      - openapitools.json
      - .openapi-generator-ignore
      - scripts/sync-spec.sh
      - scripts/generate-go-client.sh
      - scripts/lib-config.sh
      - scripts/check-duplicates.sh
      - scripts/verify.sh
      - .github/workflows/generate-client.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25.x"

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Authenticate Codex (ChatGPT)
        id: codex_auth
        continue-on-error: true
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}
        run: |
          mkdir -p "$HOME/.codex"

          if [ -n "${CODEX_AUTH_JSON}" ]; then
            printf '%s' "${CODEX_AUTH_JSON}" > "$HOME/.codex/auth.json"
            chmod 600 "$HOME/.codex/auth.json"
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${CODEX_ACCESS_TOKEN}" ]; then
            printf '%s' "${CODEX_ACCESS_TOKEN}" | codex login --with-access-token
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No CODEX_AUTH_JSON/CODEX_ACCESS_TOKEN provided; AI changelog will use fallback text."
          echo "enabled=false" >> "$GITHUB_OUTPUT"

      - name: Calculate next version
        id: version
        run: |
          latest_tag="$(git tag -l 'v*' --sort=-version:refname | head -n1)"
          if [[ -z "${latest_tag}" ]]; then
            next_version="1.0.0"
          elif [[ "${latest_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            next_patch=$((patch + 1))
            next_version="${major}.${minor}.${next_patch}"
          else
            echo "Error: latest semver tag does not match vX.Y.Z: ${latest_tag}" >&2
            exit 1
          fi

          next_tag="v${next_version}"
          if git rev-parse -q --verify "refs/tags/${next_tag}" >/dev/null; then
            echo "Error: tag already exists: ${next_tag}" >&2
            exit 1
          fi

          echo "package_version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "tag_version=${next_tag}" >> "$GITHUB_OUTPUT"
          echo "Calculated package version: ${next_version}"

      - name: Generate client
        env:
          OPENAPI_GENERATOR_DOCKER: "1"
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: bash ./scripts/generate-go-client.sh

      - name: Verify generated code
        run: bash ./scripts/verify.sh

      - name: Build release notes context
        id: relnotes_ctx
        run: |
          tmp_context="$(mktemp)"
          {
            echo "Generated SDK diff shortstat:"
            git diff --shortstat || true
            echo
            echo "Changed files (name-status):"
            git diff --name-status || true
            echo
            echo "Patch sample (first 1200 lines):"
            git diff --unified=0 | sed -n '1,1200p'
          } > "${tmp_context}"
          echo "context_file=${tmp_context}" >> "$GITHUB_OUTPUT"

      - name: Generate AI changelog for commit/tag/release
        id: relnotes_ai
        if: steps.codex_auth.outputs.enabled == 'true'
        continue-on-error: true
        run: |
          notes_file="$(mktemp)"
          codex_prompt=$'You are preparing release notes for a Go SDK release.\nTask:\n- Read only provided diff context.\n- Output concise Markdown in Russian.\n- Format: one short summary paragraph + 4-10 bullet points.\n- Include a bullet starting with "Риски:" about backward compatibility.\n- Mention uncertainty explicitly where context is insufficient.\n- No headings, no extra text.'
          cat "${{ steps.relnotes_ctx.outputs.context_file }}" | codex exec -o "${notes_file}" "${codex_prompt}"

          if [ ! -s "${notes_file}" ]; then
            exit 1
          fi

          echo "notes_file=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes fallback
        id: relnotes
        run: |
          notes_file="$(mktemp)"
          if [ -n "${{ steps.relnotes_ai.outputs.notes_file }}" ] && [ -s "${{ steps.relnotes_ai.outputs.notes_file }}" ]; then
            cp "${{ steps.relnotes_ai.outputs.notes_file }}" "${notes_file}"
          else
            {
              echo "Автоматическое обновление Go-клиента по актуальной OpenAPI спецификации."
              echo
              echo "- AI changelog недоступен (нет auth или ошибка генерации)."
              echo "- Подробности изменений смотрите в diff этого релиза."
            } > "${notes_file}"
          fi
          echo "notes_file=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Import GPG key for signed commits/tags
        id: import_gpg
        if: env.CI_GPG_PRIVATE_KEY != ''
        env:
          CI_GPG_PRIVATE_KEY: ${{ secrets.CI_GPG_PRIVATE_KEY }}
          CI_GPG_PASSPHRASE: ${{ secrets.CI_GPG_PASSPHRASE }}
        uses: crazy-max/ghaction-import-gpg@v7.0.0
        with:
          gpg_private_key: ${{ env.CI_GPG_PRIVATE_KEY }}
          passphrase: ${{ env.CI_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true

      - name: Commit regenerated client
        id: publish
        run: |
          if git diff --quiet; then
            echo "No generated changes."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ steps.import_gpg.outcome }}" == "success" ]]; then
            git config user.name "${{ steps.import_gpg.outputs.name }}"
            git config user.email "${{ steps.import_gpg.outputs.email }}"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          fi

          git add -A
          git commit \
            -m "chore: regenerate Go client (${{ steps.version.outputs.tag_version }})" \
            -m "$(cat "${{ steps.relnotes.outputs.notes_file }}")"
          if [[ "${{ steps.import_gpg.outcome }}" == "success" ]]; then
            git tag -s "${{ steps.version.outputs.tag_version }}" -F "${{ steps.relnotes.outputs.notes_file }}"
          else
            git tag -a "${{ steps.version.outputs.tag_version }}" -F "${{ steps.relnotes.outputs.notes_file }}"
          fi
          git push
          git push origin "${{ steps.version.outputs.tag_version }}"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.publish.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag_version }}" \
            --notes-file "${{ steps.relnotes.outputs.notes_file }}" \
            --title "${{ steps.version.outputs.tag_version }}"
