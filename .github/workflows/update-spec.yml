name: Update spec

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-spec:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Sync OpenAPI spec
        run: bash ./scripts/sync-spec.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- api/; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"

      - name: Install Codex CLI
        if: steps.changes.outputs.has_changes == 'true'
        run: npm install -g @openai/codex

      - name: Authenticate Codex (ChatGPT)
        if: steps.changes.outputs.has_changes == 'true'
        id: codex_auth
        continue-on-error: true
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}
        run: |
          mkdir -p "$HOME/.codex"

          if [ -n "${CODEX_AUTH_JSON}" ]; then
            printf '%s' "${CODEX_AUTH_JSON}" > "$HOME/.codex/auth.json"
            chmod 600 "$HOME/.codex/auth.json"
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${CODEX_ACCESS_TOKEN}" ]; then
            printf '%s' "${CODEX_ACCESS_TOKEN}" | codex login --with-access-token
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No CODEX_AUTH_JSON/CODEX_ACCESS_TOKEN provided; AI changelog is skipped."
          echo "enabled=false" >> "$GITHUB_OUTPUT"

      - name: Generate AI changelog (Codex headless)
        if: steps.changes.outputs.has_changes == 'true' && steps.codex_auth.outputs.enabled == 'true'
        continue-on-error: true
        run: |
          today="$(date -u +%Y-%m-%d)"
          tmp_context="$(mktemp)"
          tmp_ai="$(mktemp)"

          {
            echo "Spec diff shortstat:"
            git diff --shortstat -- api/ || true
            echo
            echo "Changed files (name-status):"
            git diff --name-status -- api/ || true
            echo
            echo "Patch sample (first 800 lines):"
            git diff --unified=0 -- api/ | sed -n '1,800p'
          } > "${tmp_context}"

          codex_prompt=$'You are preparing release notes for a Go SDK.\nTask:\n- Read only the provided spec diff context.\n- Output a concise Markdown bullet list in Russian (4-10 bullets).\n- Include only factual changes that are visible in the diff context.\n- Add one bullet starting with "Риски:" with backward-compatibility assessment.\n- If context is insufficient for some detail, state that explicitly.\n- Output bullets only, no heading and no extra text.\nDo not run any commands.'

          cat "${tmp_context}" | codex exec -o "${tmp_ai}" "${codex_prompt}"

          if [ ! -s "${tmp_ai}" ]; then
            echo "Codex returned empty changelog; skipping file update."
            exit 0
          fi

          if [ -f CHANGELOG.md ]; then
            {
              echo
              echo "### ${today}"
              cat "${tmp_ai}"
            } >> CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo
              echo "### ${today}"
              cat "${tmp_ai}"
            } > CHANGELOG.md
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          commit-message: "chore: update OpenAPI spec"
          title: "chore: update OpenAPI spec"
          body: |
            Automated update of OpenAPI spec tree from upstream.
          branch: "chore/spec-update"
          delete-branch: false
          labels: |
            automation
            openapi
          add-paths: |
            api/**
            CHANGELOG.md
